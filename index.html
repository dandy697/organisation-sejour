<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#121212" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mon séjour" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" />

  <link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><defs><linearGradient id="g" x1="24" y1="18" x2="156" y2="162" gradientUnits="userSpaceOnUse"><stop stop-color="%232563eb"/><stop offset="1" stop-color="%237dd3fc"/></linearGradient></defs><rect width="180" height="180" rx="48" fill="%23f7f9fc"/><rect x="24" y="24" width="132" height="132" rx="40" fill="url(%23g)"/><path d="M90 48c-17.6 0-30 13.1-30 29.7 0 22.9 30 49 30 49s30-26.1 30-49C120 61.1 107.6 48 90 48Z" fill="%23ffffff"/><circle cx="90" cy="79" r="12" fill="%232563eb"/><path d="M51 127c10.4-7 24.1-11 39-11s28.6 4 39 11" fill="none" stroke="%23ffffff" stroke-width="9" stroke-linecap="round" opacity=".9"/></svg>' />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <title>Mon séjour</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --panel-alt: #f1f5f9;
      --panel-soft: #e8eef8;
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.12);
      --danger: #dc2626;
      --success: #15803d;
      --line: rgba(15, 23, 42, 0.1);
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      --glass: rgba(255, 255, 255, 0.94);
      --glass-strong: rgba(255, 255, 255, 0.98);
      --topbar-bg: linear-gradient(180deg, rgba(247, 249, 252, 0.98), rgba(247, 249, 252, 0.9));
      --hero-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(241, 245, 249, 0.98));
      --hero-copy: rgba(15, 23, 42, 0.78);
      --nav-wrap-bg: linear-gradient(180deg, rgba(247, 249, 252, 0.35), rgba(247, 249, 252, 0.96) 24%);
      --nav-inner-bg: rgba(255, 255, 255, 0.96);
      --button-bg: #ffffff;
      --button-text: var(--text);
      --hero-border: rgba(37, 99, 235, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --nav-h: 84px;
      --maxw: 780px;
      --font-ui: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
      --font-title: "Plus Jakarta Sans", "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
    }

    body[data-theme="dark"] {
      --bg: #0b1220;
      --panel: #111827;
      --panel-alt: #162033;
      --panel-soft: #1b263b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-soft: rgba(96, 165, 250, 0.16);
      --danger: #f87171;
      --success: #4ade80;
      --line: rgba(148, 163, 184, 0.16);
      --shadow: 0 18px 42px rgba(2, 6, 23, 0.46);
      --glass: rgba(255, 255, 255, 0.06);
      --glass-strong: rgba(255, 255, 255, 0.08);
      --topbar-bg: linear-gradient(180deg, rgba(11, 18, 32, 0.96), rgba(11, 18, 32, 0.78));
      --hero-bg: linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(22, 32, 51, 0.98));
      --hero-copy: rgba(226, 232, 240, 0.84);
      --nav-wrap-bg: linear-gradient(180deg, rgba(11, 18, 32, 0.42), rgba(11, 18, 32, 0.96) 24%);
      --nav-inner-bg: rgba(17, 24, 39, 0.96);
      --button-bg: rgba(15, 23, 42, 0.8);
      --button-text: var(--text);
      --hero-border: rgba(96, 165, 250, 0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent 26%),
        radial-gradient(circle at bottom left, rgba(125, 211, 252, 0.14), transparent 22%),
        var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
    }

    body {
      display: flex;
      justify-content: center;
      padding: 0 0 calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app-shell {
      width: min(100%, var(--maxw));
      min-height: 100vh;
      position: relative;
    }

    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 80% 12%, rgba(37, 99, 235, 0.1), transparent 18%),
        radial-gradient(circle at 10% 18%, rgba(125, 211, 252, 0.12), transparent 16%);
      opacity: 1;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(env(safe-area-inset-top) + 18px) 18px 14px;
      backdrop-filter: blur(16px);
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .brand h1 {
      margin: 0;
      font-family: var(--font-ui);
      font-size: 1.55rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .icon-btn,
    .pill-btn,
    .nav-btn,
    .action-btn {
      border: 0;
      cursor: pointer;
      color: var(--text);
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
    }

    .icon-btn:active,
    .pill-btn:active,
    .nav-btn:active,
    .action-btn:active {
      transform: scale(0.98);
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: var(--glass);
      border: 1px solid var(--line);
      display: inline-grid;
      place-items: center;
      font-size: 1.2rem;
      flex: 0 0 auto;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .view-switch {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      position: relative;
      border-radius: 999px;
      background: var(--panel-alt);
      border: 1px solid var(--line);
      margin: 0 0 14px;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .view-switch::-webkit-scrollbar {
      display: none;
    }

    .view-switch::after {
      content: "›";
      position: sticky;
      right: 4px;
      margin-left: auto;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 1rem;
      font-weight: 800;
      background: linear-gradient(90deg, rgba(241, 245, 249, 0), rgba(241, 245, 249, 0.95) 42%, rgba(241, 245, 249, 1));
      pointer-events: none;
    }

    .theme-chip {
      min-width: 42px;
      height: 36px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
    }

    .view-chip {
      flex: 0 0 auto;
      min-width: max-content;
      height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      text-align: center;
    }

    .theme-chip.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.24);
    }

    .view-chip.active {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    .screen {
      padding: 12px 16px 0;
      animation: fadeIn 0.32s ease;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-xl);
      padding: 20px;
      background: var(--hero-bg);
      box-shadow: var(--shadow);
      border: 1px solid var(--hero-border);
      margin-bottom: 18px;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -12%;
      top: -30%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.14), transparent 70%);
      opacity: 0.5;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(37, 99, 235, 0.14);
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero h2,
    .section-title h3,
    .modal-sheet h3 {
      margin: 0;
      font-family: var(--font-title);
      letter-spacing: 0.01em;
    }

    .hero h2 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      line-height: 1.08;
    }

    .hero p {
      margin: 0;
      color: var(--hero-copy);
      max-width: 34rem;
      line-height: 1.5;
    }

    .grid-tiles {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 18px 0 0;
    }

    .tile {
      border-radius: var(--radius-lg);
      padding: 14px;
      background: var(--glass-strong);
      border: 1px solid var(--line);
      min-height: 88px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
    }

    .tile span {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 6px;
    }

    .tile strong {
      display: block;
      font-size: 1.2rem;
      line-height: 1.25;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 12px;
    }

    .section-title p {
      color: var(--muted);
      margin: 4px 0 0;
      font-size: 0.92rem;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(248, 250, 252, 0.98));
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 15px;
      box-shadow: var(--shadow);
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .day-header h4,
    .step-main h4,
    .place-head h4 {
      margin: 0;
      font-size: 1rem;
    }

    .muted {
      color: var(--muted);
    }

    .badge-row,
    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge,
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--panel-alt);
      color: var(--text);
      font-size: 0.76rem;
      border: 1px solid var(--line);
    }

    .source-auto {
      color: var(--accent);
      border-color: rgba(37, 99, 235, 0.2);
      background: rgba(37, 99, 235, 0.08);
    }

    .source-cache {
      color: #1d4ed8;
      background: rgba(96, 165, 250, 0.12);
      border-color: rgba(96, 165, 250, 0.2);
    }

    .source-manual {
      color: var(--muted);
    }

    .step-card {
      position: relative;
      overflow: hidden;
    }

    .step-card.done {
      opacity: 0.78;
    }

    .step-card.done::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(37, 99, 235, 0.07), transparent);
      pointer-events: none;
    }

    .step-top,
    .place-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .time-badge {
      min-width: 62px;
      padding: 10px 12px;
      text-align: center;
      border-radius: 16px;
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.18);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.03em;
      font-size: 0.88rem;
    }

    .step-main,
    .place-copy {
      flex: 1;
    }

    .step-main p,
    .place-copy p,
    .info-card textarea,
    .field-hint {
      color: var(--muted);
      line-height: 1.5;
    }

    .step-main p,
    .place-copy p {
      margin: 8px 0 0;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      border-radius: var(--radius-lg);
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 16px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
    }

    .metric strong {
      font-size: 1.3rem;
    }

    .pill-btn,
    .action-btn {
      min-height: 42px;
      border-radius: 14px;
      padding: 0 14px;
      background: var(--button-bg);
      border: 1px solid var(--line);
      color: var(--button-text);
    }

    .pill-btn.primary,
    .action-btn.primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      border-color: transparent;
      font-weight: 700;
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.2);
    }

    .pill-btn.ghost,
    .action-btn.ghost {
      background: transparent;
    }

    .pill-btn.danger,
    .action-btn.danger {
      color: var(--danger);
    }

    .fab {
      position: fixed;
      right: 18px;
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);
      z-index: 40;
      height: 56px;
      min-width: 56px;
      padding: 0 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: 0;
      box-shadow: 0 16px 24px rgba(37, 99, 235, 0.28);
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .mini-map {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(241, 245, 249, 0.98));
      border: 1px solid var(--line);
    }

    .mini-map strong {
      display: block;
      margin-bottom: 8px;
    }

    .weather-card {
      display: grid;
      gap: 10px;
    }

    .weather-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .weather-icon {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(37, 99, 235, 0.1);
      border: 1px solid rgba(37, 99, 235, 0.16);
      flex: 0 0 auto;
      overflow: hidden;
    }

    .weather-icon svg {
      width: 34px;
      height: 34px;
      display: block;
    }

    .weather-temp {
      font-size: 1.9rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .weather-label {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .weather-subline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .route-map-card {
      overflow: hidden;
      padding: 0;
    }

    .route-map-frame {
      position: relative;
      min-height: 280px;
      border-radius: var(--radius-lg);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(241, 245, 249, 0.98)),
        radial-gradient(circle at 20% 20%, rgba(37, 99, 235, 0.08), transparent 28%);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .route-map-frame::after {
      content: "";
      position: absolute;
      inset: auto -10% -30% auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.14), transparent 68%);
      pointer-events: none;
    }

    .route-map-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 16px 0;
    }

    .route-map-head strong {
      display: block;
      font-size: 1.05rem;
    }

    .route-map-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .route-map-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .route-map-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--panel-alt);
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 0.78rem;
    }

    .route-map-canvas {
      width: 100%;
      height: 280px;
      margin-top: 10px;
    }

    .route-map-fallback {
      display: grid;
      place-items: center;
      height: 280px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .route-map-copy {
      padding: 16px;
    }

    .route-map-legend {
      display: grid;
      gap: 10px;
    }

    .route-map-stop {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--panel-alt);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .route-map-index {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: rgba(37, 99, 235, 0.12);
      border: 1px solid rgba(37, 99, 235, 0.18);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .leaflet-container {
      background: transparent;
      font-family: var(--font-ui);
    }

    .leaflet-control-attribution {
      background: rgba(18, 18, 18, 0.78) !important;
      color: var(--muted) !important;
      border-radius: 10px 0 0 0;
      padding: 4px 8px !important;
    }

    .leaflet-control-attribution a {
      color: #2563eb !important;
    }

    body[data-theme="dark"] .tile,
    body[data-theme="dark"] .metric,
    body[data-theme="dark"] .mini-map,
    body[data-theme="dark"] .route-map-frame,
    body[data-theme="dark"] .route-map-stop,
    body[data-theme="dark"] .route-map-pill,
    body[data-theme="dark"] .info-card,
    body[data-theme="dark"] .place-result,
    body[data-theme="dark"] .card,
    body[data-theme="dark"] .modal-sheet {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(15, 23, 42, 0.98));
      border-color: var(--line);
      color: var(--text);
      box-shadow: var(--shadow);
    }

    body[data-theme="dark"] .tile,
    body[data-theme="dark"] .metric,
    body[data-theme="dark"] .info-card,
    body[data-theme="dark"] .place-result {
      background: linear-gradient(180deg, rgba(17, 24, 39, 0.98), rgba(22, 32, 51, 0.98));
    }

      return {
        compressToEncodedURIComponent,
        decompressFromEncodedURIComponent
      };
    })();

    function encodeTripForUrl(trip) {
      try {
        const json = JSON.stringify(trip);
        return `lz:${LZString.compressToEncodedURIComponent(json)}`;
      } catch (error) {
        return "";
      }
    }

    function buildSharedTripPayload(trip) {
      const sharedMeta = {
        ...(trip.meta || {}),
        hideBudgetShared: true
      };
      delete sharedMeta.localId;
      return {
        ...trip,
        meta: sharedMeta,
        steps: (trip.steps || []).map((step) => ({
          ...step,
          cost: 0
        })),
        places: (trip.places || []).map((place) => ({
          ...place,
          estimatedCost: 0,
          imageUrl: "",
          imageAlt: ""
        }))
      };
    }

    function decodeTripFromUrl(encoded) {
      try {
        const value = String(encoded || "");
        if (value.startsWith("lz:")) {
          const json = LZString.decompressFromEncodedURIComponent(value.slice(3));
          return json ? mergeTripData(JSON.parse(json)) : null;
        }
        const normalized = value.replace(/-/g, "+").replace(/_/g, "/");
        const padded = normalized + "=".repeat((4 - (normalized.length % 4 || 4)) % 4);
        const binary = atob(padded);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        const json = new TextDecoder().decode(bytes);
        return mergeTripData(JSON.parse(json));
      } catch (error) {
        return null;
      }
    }

    function extractTripParamFromLocation() {
      try {
        const searchParams = new URLSearchParams(window.location.search || "");
        const fromSearch = searchParams.get("trip");
        if (fromSearch) return fromSearch;
      } catch (error) {
        // ignore and continue to hash fallback
      }
      const hash = String(window.location.hash || "");
      const match = hash.match(/(?:^#|[?#&])trip=([^&]+)/);
      return match ? match[1] : "";
    }

    function getSharedTripFromUrl() {
      const encoded = extractTripParamFromLocation();
      if (!encoded) return null;
      return decodeTripFromUrl(decodeURIComponent(encoded));
    }

    function getBaseAppUrl() {
      if (SHAREABLE_APP_URL) return SHAREABLE_APP_URL;
      const currentUrl = window.location.href;
      const protocol = window.location.protocol;
      const host = window.location.hostname;
      if (!currentUrl || protocol === "file:") return "";
      if (host === "localhost" || host === "127.0.0.1") return "";
      return `${window.location.origin}${window.location.pathname}`;
    }

    function loadTrip() {
      try {
        const sharedTrip = getSharedTripFromUrl();
        if (sharedTrip) {
          const mergedSharedTrip = mergeTripData(sharedTrip);
          localStorage.setItem(STORAGE_KEYS.trip, JSON.stringify(mergedSharedTrip));
          return mergedSharedTrip;
        }
        const raw = localStorage.getItem(STORAGE_KEYS.trip);
        if (!raw) return cloneDefaultTrip();
        const parsed = JSON.parse(raw);
        if (parsed?.meta?.title === "Escapade parisienne") {
          return cloneDefaultTrip();
        }
        let shouldPersist = false;
        if (parsed?.meta?.title === "Rome express a deux") {
          parsed.meta.title = "Mon prochain séjour";
          shouldPersist = true;
        }
        const mergedTrip = mergeTripData(parsed);
        if (!parsed?.meta?.localId) {
          shouldPersist = true;
        }
        if (shouldPersist) {
          localStorage.setItem(STORAGE_KEYS.trip, JSON.stringify(mergedTrip));
        }
        return mergedTrip;
      } catch (error) {
        return cloneDefaultTrip();
      }
    }

    const initialTrip = loadTrip();

    const state = {
      trip: initialTrip,
      documents: loadDocumentsForTrip(initialTrip),
      theme: loadTheme(),
      activeTab: "planning",
      ui: {
        modal: null,
        selectedPlaceDraft: null,
        placeSearchQuery: "",
        placeSearchSelectionStart: null,
        placeSearchSelectionEnd: null,
        placeSearchResults: [],
        placeSearchStatus: "",
        isSearchingPlaces: false,
        isEnrichingPlace: false,
        enrichingPlaceId: null,
        mapDayFilter: "all",
        feedback: null,
        importInputId: uid()
      },
      cache: loadCache(),
      runtime: {
        lastNominatimCall: 0,
        routeMap: null,
        leafletReady: null,
        weatherLoading: false,
        weatherKey: "",
        weatherRefreshTimer: null,
        manifestUrl: "",
        imageOptimizationPromise: null
      }
    };

    function saveTrip() {
      try {
        localStorage.setItem(STORAGE_KEYS.trip, JSON.stringify(state.trip));
      } catch (error) {
        setFeedback("Impossible d'enregistrer localement certaines modifications pour le moment.", "error");
      }
    }

    function resetTrip() {
      state.trip = cloneDefaultTrip();
      syncPlacesFromSteps();
      hydrateDocumentsForCurrentTrip([]);
      saveTrip();
      setFeedback("Voyage réinitialisé avec les données de démonstration.", "success");
      renderApp();
    }

    function createEmptyTrip() {
      const today = new Date();
      const startDate = today.toISOString().slice(0, 10);
      const endDate = new Date(today.getTime() + 2 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);
      state.trip = {
        meta: {
          title: "Nouveau séjour",
          destination: "",
          startDate,
          endDate,
          companion: "",
          localId: uid()
        },
        steps: [],
        places: [],
        info: {
          hotel: "",
          transports: "",
          reminders: "",
          reservations: "",
          tips: "",
          notes: ""
        }
      };
      hydrateDocumentsForCurrentTrip([]);
      saveTrip();
      state.activeTab = "planning";
      closeModal();
      openModal("trip-settings");
      setFeedback("Nouveau séjour créé. Vous pouvez maintenant le personnaliser.", "success");
      renderApp();
    }

    function exportTrip() {
      const blob = new Blob([JSON.stringify({ ...state.trip, documents: state.documents }, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${normalizeCacheKey(state.trip.meta.title || "voyage") || "voyage"}.json`;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
      setFeedback("Export JSON prêt.", "success");
    }

    function importTrip(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data || typeof data !== "object") throw new Error("invalid");
          state.trip = {
            ...cloneDefaultTrip(),
            ...data,
            meta: { ...cloneDefaultTrip().meta, ...(data.meta || {}) },
            info: { ...cloneDefaultTrip().info, ...(data.info || {}) },
            steps: Array.isArray(data.steps) ? data.steps : [],
            places: Array.isArray(data.places) ? data.places : []
          };
          state.trip.meta.localId = state.trip.meta.localId || uid();
          syncPlacesFromSteps();
          hydrateDocumentsForCurrentTrip(Array.isArray(data.documents) ? data.documents : []);
          saveTrip();
          setFeedback("Voyage importé avec succès.", "success");
          renderApp();
          optimizeStoredPlaceImages();
        } catch (error) {
          setFeedback("Import impossible. Vérifiez le fichier JSON.", "error");
          renderApp();
        }
      };
      reader.readAsText(file);
    }

    function copySummary() {
      const summary = buildTripSummary();
      return copyText(summary)
        .then((ok) => {
          setFeedback(ok ? "Résumé copié." : "Impossible de copier automatiquement le résumé.", ok ? "success" : "error");
          renderApp();
        });
    }

    function getShareableAppUrl() {
      const baseUrl = getBaseAppUrl();
      if (!baseUrl) return "";
      const payload = encodeTripForUrl(buildSharedTripPayload(state.trip));
      if (!payload) return baseUrl;
      return `${baseUrl}?trip=${encodeURIComponent(payload)}`;
    }

    function buildShareLinkOnlyText() {
      return getShareableAppUrl();
    }

    async function shareTrip() {
      const appUrl = getShareableAppUrl();
      if (!appUrl) {
        openModal("share-sheet");
        setFeedback("Aucun lien public détecté pour cette app. Hébergez-la ou renseignez SHAREABLE_APP_URL.", "error");
        renderApp();
        return;
      }
      if (navigator.share && window.isSecureContext) {
        try {
          await navigator.share({
            title: state.trip.meta.title,
            url: appUrl
          });
          setFeedback("Lien de l'app partagé.", "success");
        } catch (error) {
          if (error && error.name !== "AbortError") {
            openModal("share-sheet");
            setFeedback("Partage système indisponible ici. Utilisez les options de l'app.", "info");
          }
        }
      } else {
        openModal("share-sheet");
        setFeedback("Partage système indisponible ici. Utilisez les options de l'app.", "info");
      }
      renderApp();
    }

    function copyAppLink() {
      const appUrl = getShareableAppUrl();
      if (!appUrl) {
        setFeedback("Aucun lien public détecté pour cette app. Hébergez-la ou renseignez SHAREABLE_APP_URL.", "error");
        renderApp();
        return Promise.resolve(false);
      }
      return copyText(appUrl).then((ok) => {
        setFeedback(ok ? "Lien de l'app copié." : "Impossible de copier le lien.", ok ? "success" : "error");
        renderApp();
        return ok;
      });
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (error) {
          // Continue toward fallback below.
        }
      }

      try {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.setAttribute("readonly", "");
        textarea.style.position = "fixed";
        textarea.style.opacity = "0";
        textarea.style.pointerEvents = "none";
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        const ok = document.execCommand("copy");
        document.body.removeChild(textarea);
        return ok;
      } catch (error) {
        return false;
      }
    }

    function buildMailtoShareUrl() {
      const subject = encodeURIComponent(state.trip.meta.title || "Programme de voyage");
      const body = encodeURIComponent(buildShareLinkOnlyText() || "");
      return `mailto:?subject=${subject}&body=${body}`;
    }

    function buildWhatsAppShareUrl() {
      return `https://wa.me/?text=${encodeURIComponent(buildShareLinkOnlyText() || "")}`;
    }

    function computeBudget() {
      const stats = {
        total: 0,
        transport: 0,
        repas: 0,
        visites: 0,
        autres: 0,
        payantCount: 0,
        lieux: 0
      };

      state.trip.steps.forEach((step) => {
        const value = Number(step.cost || 0);
        stats.total += value;
        if (value > 0) stats.payantCount += 1;
        if (step.type === "transport") stats.transport += value;
        else if (step.type === "repas") stats.repas += value;
        else if (step.type === "visite") stats.visites += value;
        else stats.autres += value;
      });

      state.trip.places.forEach((place) => {
        const value = Number(place.estimatedCost || 0);
        if (value <= 0) return;
        stats.total += value;
        stats.lieux += value;
        stats.autres += value;
        stats.payantCount += 1;
      });

      return stats;
    }

    function isBudgetHidden() {
      return Boolean(state.trip?.meta?.hideBudgetShared);
    }

    function computeStats() {
      const days = Array.from(new Set(state.trip.steps.map((step) => step.day || step.date || "Jour 1")));
      const sortedSteps = [...state.trip.steps].sort(sortSteps);
      const nextStep = sortedSteps.find((step) => !step.done) || null;
      const totalDuration = state.trip.steps.reduce((sum, step) => sum + Number(step.duration || 0), 0);
      return {
        daysCount: days.length || 1,
        totalSteps: state.trip.steps.length,
        nextStep,
        totalDuration,
        placesCount: state.trip.places.length,
        budget: computeBudget()
      };
    }

    function doesPlaceMatchStep(place, step) {
      const placeId = String(place.id || "");
      const stepPlaceId = String(step.placeId || "");
      if (placeId && stepPlaceId && placeId === stepPlaceId) return true;

      const placeName = normalizeCacheKey(place.name || "");
      const placeAddress = normalizeCacheKey(place.address || "");
      const stepTitle = normalizeCacheKey(step.title || "");
      const stepAddress = normalizeCacheKey(step.address || "");

      const candidates = [placeName, placeAddress].filter(Boolean);
      const stepCandidates = [stepTitle, stepAddress].filter(Boolean);

      return candidates.some((candidate) =>
        stepCandidates.some((value) =>
          candidate === value ||
          (candidate.length > 5 && value.includes(candidate)) ||
          (value.length > 5 && candidate.includes(value))
        )
      );
    }

    function getUpcomingSteps() {
      return [...state.trip.steps]
        .filter((step) => !step.done)
        .sort(sortSteps);
    }

    function getMapDayOptions() {
      return groupStepsByDay()
        .map(([dateKey, steps]) => ({
          key: dateKey,
          label: formatDayHeading(dateKey === "date-libre" ? "" : dateKey),
          chipLabel: formatDayChipLabel(dateKey === "date-libre" ? "" : dateKey),
          count: steps.length
        }));
    }

    function getSelectedMapDay() {
      const options = getMapDayOptions();
      if (state.ui.mapDayFilter === "all") return "all";
      return options.some((option) => option.key === state.ui.mapDayFilter) ? state.ui.mapDayFilter : "all";
    }

    function getStepsForMapDay(dayKey = getSelectedMapDay()) {
      const sortedSteps = [...state.trip.steps].sort(sortSteps);
      if (dayKey === "all") return sortedSteps;
      return sortedSteps.filter((step) => (step.date || "date-libre") === dayKey);
    }

    function findMatchingPlaceForStep(step) {
      return state.trip.places.find((place) => doesPlaceMatchStep(place, step)) || null;
    }

    function getLinkedPlaceForStep(step) {
      if (!step) return null;
      if (step.placeId) {
        const exactPlace = state.trip.places.find((place) => place.id === step.placeId);
        if (exactPlace) return exactPlace;
      }
      return findMatchingPlaceForStep(step);
    }

    function shouldAutoCreatePlaceFromStep(step) {
      if (!step) return false;
      const type = String(step.type || "").trim().toLowerCase();
      if (type === "transport") return false;
      const title = String(step.title || "").trim();
      const address = String(step.address || "").trim();
      if (title.length < 3 && address.length < 6) return false;
      return true;
    }

    function createPlaceFromStep(step, existingPlaceId = "") {
      const title = String(step.title || "").trim();
      const address = String(step.address || "").trim();
      return {
        id: String(existingPlaceId || step.placeId || uid()),
        name: title || address || "Lieu",
        address,
        latitude: "",
        longitude: "",
        type: String(step.type || "lieu").trim() || "lieu",
        category: "timeline",
        googleMapsUrl: buildGoogleMapsSearchUrl(address || title),
        shortDescription: String(step.description || step.note || "").trim(),
        imageUrl: "",
        imageAlt: title || address || "Lieu",
        historyText: String(step.historyText || "").trim(),
        anecdote: String(step.anecdote || "").trim(),
        practicalTip: String(step.practicalTip || "").trim(),
        recommendedDuration: Number(step.duration || 0) || 60,
        estimatedCost: Number(step.cost || 0) || 0,
        personalNote: "",
        wikiTitle: "",
        wikiUrl: "",
        sourceLang: "fr",
        sourceBadge: "Timeline"
      };
    }

    function ensurePlaceLinkedForStep(step) {
      if (!shouldAutoCreatePlaceFromStep(step)) return step;

      const exactLinkedPlace = step.placeId ? state.trip.places.find((place) => place.id === step.placeId) || null : null;
      if (exactLinkedPlace) return step;

      const matchedPlace = findMatchingPlaceForStep(step);
      if (matchedPlace) {
        return step.placeId === matchedPlace.id ? step : { ...step, placeId: matchedPlace.id };
      }

      const createdPlace = createPlaceFromStep(step);
      state.trip.places.unshift(createdPlace);
      return { ...step, placeId: createdPlace.id };
    }

    function syncPlacesFromSteps() {
      let changed = false;
      state.trip.steps = state.trip.steps.map((step) => {
        const nextStep = ensurePlaceLinkedForStep(step);
        if (nextStep !== step || nextStep.placeId !== step.placeId) changed = true;
        return nextStep;
      });
      return changed;
    }

    function getMapTimelineEntries(dayKey = getSelectedMapDay()) {
      const timeline = getTimelineContext();
      return getStepsForMapDay(dayKey).map((step) => {
        const place = findMatchingPlaceForStep(step);
        const lat = Number(place?.latitude);
        const lon = Number(place?.longitude);
        const hasCoords = Number.isFinite(lat) && Number.isFinite(lon);
        const status = timeline.current?.id === step.id ? "current" : (timeline.upcoming?.id === step.id ? "upcoming" : (step.done ? "done" : "planned"));
        return {
          id: step.id,
          step,
          place,
          name: step.title || place?.name || "Étape",
          address: step.address || place?.address || "",
          type: step.type || place?.type || "autre",
          googleMapsUrl: step.googleMapsUrl || place?.googleMapsUrl || buildGoogleMapsSearchUrl(step.address || step.title || place?.name || ""),
          lat,
          lon,
          hasCoords,
          status,
          sourceBadge: place?.sourceBadge || "Timeline",
          coordsLabel: hasCoords ? `${place.latitude}, ${place.longitude}` : "Coordonnées à compléter"
        };
      });
    }

    function getMapPlottedPoints(dayKey = getSelectedMapDay()) {
      return getMapTimelineEntries(dayKey)
        .filter((entry) => entry.hasCoords)
        .map((entry) => ({
          ...entry,
          sourceLabel: entry.place?.name || entry.name
        }));
    }

    function renderRouteMapCard(dayKey = getSelectedMapDay()) {
      const points = getMapPlottedPoints(dayKey);
      const totalEntries = getMapTimelineEntries(dayKey).length;
      const dayOptions = getMapDayOptions();
      const currentDay = dayKey === "all"
        ? `${computeStats().daysCount} jours`
        : (dayOptions.find((option) => option.key === dayKey)?.label || "Jour sélectionné");
      if (!points.length) {
        return `
          <article class="card route-map-card">
            <div class="route-map-copy">
              <strong>Plan du séjour</strong>
              <p class="muted">Les étapes sont bien prises depuis la timeline, mais aucune n'a encore de coordonnées exploitables dans cette vue.</p>
            </div>
          </article>
        `;
      }

      return `
        <article class="card route-map-card">
          <div class="route-map-frame">
            <div class="route-map-head">
              <div>
                <strong>Plan intégré</strong>
                <p>Vraie carte interactive OpenStreetMap dans l'app.</p>
              </div>
              <div class="route-map-meta">
                <span class="route-map-pill">${points.length}/${totalEntries} étapes placées</span>
                <span class="route-map-pill">${escapeHtml(currentDay)}</span>
              </div>
            </div>
            <div id="route-map-canvas" class="route-map-canvas" aria-label="Plan du séjour"></div>
          </div>
          <div class="route-map-copy">
            <p class="muted" style="margin:0 0 12px;">Repérez d'un coup d'oeil les points forts ${dayKey === "all" ? "du séjour" : "de la journée"} et l'ordre général du parcours.</p>
            <div class="route-map-legend">
              ${points.map((point, index) => `
                <div class="route-map-stop">
                  <span class="route-map-index">${index + 1}</span>
                  <span>${escapeHtml(point.name)}</span>
                </div>
              `).join("")}
            </div>
          </div>
        </article>
      `;
    }

    function ensureLeafletLoaded() {
      if (window.L) return Promise.resolve(window.L);
      if (state.runtime.leafletReady) return state.runtime.leafletReady;
      state.runtime.leafletReady = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        script.async = true;
        script.onload = () => resolve(window.L);
        script.onerror = () => reject(new Error("leaflet-load-failed"));
        document.head.appendChild(script);
      });
      return state.runtime.leafletReady;
    }

    function destroyRouteMap() {
      if (state.runtime.routeMap) {
        state.runtime.routeMap.remove();
        state.runtime.routeMap = null;
      }
    }

    async function initRouteMap() {
      const container = document.getElementById("route-map-canvas");
      if (!container) {
        destroyRouteMap();
        return;
      }
      const points = getMapPlottedPoints();
      if (!points.length) return;

      try {
        const L = await ensureLeafletLoaded();
        if (!document.getElementById("route-map-canvas")) return;
        destroyRouteMap();
        const map = L.map(container, {
          zoomControl: false,
          attributionControl: true
        });

        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "&copy; OpenStreetMap contributors"
        }).addTo(map);

        const latlngs = points.map((point) => [point.lat, point.lon]);
        L.polyline(latlngs, {
          color: "#d4af37",
          weight: 4,
          opacity: 0.9
        }).addTo(map);

        points.forEach((point, index) => {
          const pinClass = point.status === "current" ? "current" : (point.status === "upcoming" ? "upcoming" : "");
          const icon = L.divIcon({
            className: "",
            html: `<div class="map-pin ${pinClass}">${index + 1}</div>`,
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          });
          L.marker([point.lat, point.lon], { icon })
            .addTo(map)
            .bindPopup(`<strong>${escapeHtml(point.name)}</strong><br>${escapeHtml(point.address || "")}`);
        });

        map.fitBounds(latlngs, {
          padding: [26, 26]
        });

        state.runtime.routeMap = map;
      } catch (error) {
        container.innerHTML = `<div class="route-map-fallback">Impossible de charger la carte interactive pour le moment.<br>Le parcours reste disponible juste en dessous.</div>`;
      }
    }

    function buildTripSummary() {
      const stats = computeStats();
      const grouped = groupStepsByDay();
      const lines = [
        `${state.trip.meta.title} - ${state.trip.meta.destination}`,
        `${formatDateLabel(state.trip.meta.startDate)} au ${formatDateLabel(state.trip.meta.endDate)}`,
        state.trip.meta.companion ? `Avec ${state.trip.meta.companion}` : "",
        "",
        "Programme",
      ];

      grouped.forEach(([day, steps]) => {
        lines.push(``);
        lines.push(`${day}`);
        steps.forEach((step) => {
          lines.push(`- ${step.time || "--:--"} • ${step.title}${step.address ? " - " + step.address : ""}`);
        });
      });

      lines.push("");
      lines.push("Infos utiles");
      if (state.trip.info.hotel) lines.push(`Hotel : ${state.trip.info.hotel}`);
      if (state.trip.info.transports) lines.push(`Transports : ${state.trip.info.transports}`);
      if (state.trip.info.reservations) lines.push(`Reservations : ${state.trip.info.reservations}`);
      if (!isBudgetHidden()) {
        lines.push("");
        lines.push(`Budget total : ${formatCurrency(stats.budget.total)}`);
      }
      return lines.filter(Boolean).join("\n");
    }

    function debounce(fn, delay = 300) {
      let timeoutId;
      return (...args) => {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => fn(...args), delay);
      };
    }

    async function safeFetch(url, options = {}, timeoutMs = 9000) {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const response = await fetch(url, {
          ...options,
          signal: controller.signal,
          headers: {
            Accept: "application/json",
            ...options.headers
          }
        });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response;
      } finally {
        clearTimeout(timeout);
      }
    }

    async function throttleNominatim() {
      const elapsed = Date.now() - state.runtime.lastNominatimCall;
      if (elapsed < NOMINATIM_THROTTLE_MS) {
        await new Promise((resolve) => setTimeout(resolve, NOMINATIM_THROTTLE_MS - elapsed));
      }
      state.runtime.lastNominatimCall = Date.now();
    }

    async function searchPlaceNominatim(query) {
      const normalized = normalizeCacheKey(query);
      if (!normalized) return { results: [], source: "empty" };

      const cached = getCached("placesSearch", normalized);
      if (cached) {
        return { results: cached.payload, source: "cache" };
      }

      await throttleNominatim();
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&limit=5&addressdetails=1&namedetails=1&accept-language=fr`;

      // En production, prévoir un User-Agent explicite côté serveur/proxy pour respecter les règles Nominatim.
      const response = await safeFetch(url, {});
      const data = await response.json();
      setCached("placesSearch", normalized, data, "nominatim");
      return { results: data, source: "network" };
    }

    async function reverseGeocodeIfNeeded(lat, lon) {
      if (!lat || !lon) return null;
      const key = normalizeCacheKey(`reverse-${lat}-${lon}`);
      const cached = getCached("placeDetails", key);
      if (cached) return cached.payload;

      await throttleNominatim();
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}&addressdetails=1`;
      const response = await safeFetch(url, {});
      const data = await response.json();
      setCached("placeDetails", key, data, "nominatim-reverse");
      return data;
    }

    function simplifyPlaceName(value) {
      return String(value || "")
        .replace(/\s*\([^)]*\)\s*/g, " ")
        .replace(/\s*[-–,:]\s*.*/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function buildWikipediaQueries(place) {
      const candidates = [
        place.wikiTitle || "",
        place.name || "",
        simplifyPlaceName(place.name || ""),
        `${simplifyPlaceName(place.name || "")} ${state.trip.meta.destination || ""}`.trim(),
        `${place.name || ""} ${state.trip.meta.destination || ""}`.trim(),
        `${simplifyPlaceName(place.name || "")} ${String(place.address || "").split(",")[0] || ""}`.trim()
      ];

      return Array.from(new Set(candidates.map((item) => String(item || "").trim()).filter(Boolean)));
    }

    async function searchWikipediaQuery(query, mode = "title") {
      const normalized = normalizeCacheKey(`wiki-${mode}-${query}`);
      const cached = getCached("placeDetails", normalized);
      if (cached) return { ...cached.payload, source: "cache" };

      const languages = ["fr", "en"];
      for (const lang of languages) {
        try {
          const endpoint = mode === "page" ? "page" : "title";
          const url = `https://${lang}.wikipedia.org/w/rest.php/v1/search/${endpoint}?q=${encodeURIComponent(query)}&limit=5`;
          const response = await safeFetch(url, {});
          const data = await response.json();
          const pages = Array.isArray(data.pages) ? data.pages : [];
          if (pages.length) {
            const result = {
              lang,
              results: pages.map((page) => ({
                title: page.title,
                description: page.description || "",
                key: page.key || page.title
              }))
            };
            setCached("placeDetails", normalized, result, `wiki-${mode}-${lang}`);
            return { ...result, source: "network" };
          }
        } catch (error) {
          continue;
        }
      }

      return { lang: "fr", results: [], source: "none" };
    }

    async function searchWikipediaTitle(place) {
      const queries = buildWikipediaQueries(place);
      for (const query of queries) {
        const byTitle = await searchWikipediaQuery(query, "title");
        if (byTitle.results.length) return byTitle;

        const byPage = await searchWikipediaQuery(query, "page");
        if (byPage.results.length) return byPage;
      }

      return { lang: "fr", results: [], source: "none" };
    }

    async function fetchWikipediaSummary(title, lang = "fr") {
      const normalized = normalizeCacheKey(`wiki-summary-${lang}-${title}`);
      const cached = getCached("wikiSummaries", normalized);
      if (cached) return { ...cached.payload, source: "cache" };

      try {
        const restUrl = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
        const response = await safeFetch(restUrl, {});
        const data = await response.json();
        const imageSource = data.thumbnail?.source || data.originalimage?.source || "";
        const payload = {
          wikiTitle: data.title || title,
          wikiUrl: data.content_urls?.desktop?.page || `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title)}`,
          shortDescription: data.description || "",
          historyText: data.extract || "",
          sourceLang: lang,
          imageUrl: await optimizeRemoteImageDataUrl(imageSource),
          imageAlt: data.title || title
        };
        setCached("wikiSummaries", normalized, payload, `wiki-summary-${lang}`);
        return { ...payload, source: "network" };
      } catch (error) {
        try {
          // Fallback résumé historique compatible, mais non retenu comme base long terme.
          const legacyUrl = `https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
          const response = await safeFetch(legacyUrl, {});
          const data = await response.json();
          const imageSource = data.thumbnail?.source || data.originalimage?.source || "";
          const payload = {
            wikiTitle: data.title || title,
            wikiUrl: data.content_urls?.desktop?.page || `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(title)}`,
            shortDescription: data.description || "",
            historyText: data.extract || "",
            sourceLang: lang,
            imageUrl: await optimizeRemoteImageDataUrl(imageSource),
            imageAlt: data.title || title
          };
          setCached("wikiSummaries", normalized, payload, `wiki-legacy-${lang}`);
          return { ...payload, source: "network" };
        } catch (fallbackError) {
          return null;
        }
      }
    }

    async function enrichPlaceAutomatically(place) {
      const cacheKey = normalizeCacheKey(`${place.name}-${place.address}`);
      const cached = getCached("placeDetails", cacheKey);
      if (cached) {
        return {
          ...place,
          ...cached.payload,
          sourceBadge: "Cache",
          enrichmentStatus: "cache"
        };
      }

      const search = await searchWikipediaTitle(place);
      const selected = search.results[0];
      if (!selected) {
        return {
          ...place,
          sourceBadge: place.sourceBadge || "Manuel",
          enrichmentStatus: "no-match"
        };
      }

      const summary = await fetchWikipediaSummary(selected.title, search.lang);
      if (!summary) {
        return {
          ...place,
          wikiTitle: selected.title,
          wikiUrl: `https://${search.lang}.wikipedia.org/wiki/${encodeURIComponent(selected.title)}`,
          sourceLang: search.lang,
          sourceBadge: "Manuel",
          enrichmentStatus: "summary-unavailable"
        };
      }

      const enriched = {
        ...place,
        ...summary,
        shortDescription: summary.shortDescription || place.shortDescription || "",
        historyText: summary.historyText || place.historyText || "",
        sourceBadge: search.source === "cache" || summary.source === "cache" ? "Cache" : "Auto",
        enrichmentStatus: search.source === "cache" || summary.source === "cache" ? "cache" : "auto"
      };
      setCached("placeDetails", cacheKey, {
        wikiTitle: enriched.wikiTitle,
        wikiUrl: enriched.wikiUrl,
        shortDescription: enriched.shortDescription,
        historyText: enriched.historyText,
        sourceLang: enriched.sourceLang,
        imageUrl: enriched.imageUrl || "",
        imageAlt: enriched.imageAlt || enriched.name || ""
      }, "enriched-place");
      return enriched;
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat("fr-FR", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    function formatDuration(minutes) {
      const total = Number(minutes || 0);
      if (!total) return "Duree libre";
      if (total < 60) return `${total} min`;
      const hours = Math.floor(total / 60);
      const mins = total % 60;
      return mins ? `${hours} h ${mins}` : `${hours} h`;
    }

    function formatDurationInputValue(minutes) {
      const total = Number(minutes || 0);
      if (!total) return "";
      if (total < 60) return `${total} min`;
      const hours = Math.floor(total / 60);
      const mins = total % 60;
      return mins ? `${hours}h${mins}` : `${hours}h`;
    }

    function parseDurationInput(value) {
      const raw = String(value || "").trim().toLowerCase();
      if (!raw) return 0;

      const normalized = raw
        .replace(/heures?/g, "h")
        .replace(/heure/g, "h")
        .replace(/hrs?/g, "h")
        .replace(/minutes?/g, "min")
        .replace(/\s+/g, "");

      if (/^\d+$/.test(normalized)) {
        return Number(normalized);
      }

      const hourMatch = normalized.match(/^(\d+)(?:h)(\d{1,2})?$/);
      if (hourMatch) {
        const hours = Number(hourMatch[1] || 0);
        const mins = Number(hourMatch[2] || 0);
        return (hours * 60) + mins;
      }

      const mixedMatch = normalized.match(/^(\d+)h(?:(\d+)min?)?$/);
      if (mixedMatch) {
        const hours = Number(mixedMatch[1] || 0);
        const mins = Number(mixedMatch[2] || 0);
        return (hours * 60) + mins;
      }

      const minuteMatch = normalized.match(/^(\d+)min?$/);
      if (minuteMatch) {
        return Number(minuteMatch[1] || 0);
      }

      return Number.parseInt(normalized, 10) || 0;
    }

    function formatDateLabel(dateStr) {
      if (!dateStr) return "Date libre";
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return dateStr;
      return DATE_FORMATTERS.shortDate.format(date);
    }

    function formatDayHeading(dateStr) {
      if (!dateStr) return "Date libre";
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return dateStr;
      return formatCapitalizedDate(date, DATE_FORMATTERS.longDay);
    }

    function formatDayChipLabel(dateStr) {

      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return dateStr;
      const label = DATE_FORMATTERS.chipDay.format(date);
      return label
        .replace(/^([a-zà-ÿ]+)\.?/i, (_, weekday) => `${weekday.charAt(0).toUpperCase()}${weekday.slice(1)}.`)
        .replace(/\s+/g, " ")
        .trim();
    }

    function formatFileSize(bytes) {
      const value = Number(bytes || 0);
      if (!value) return "Sans fichier";
      if (value < 1024) return `${value} o`;
      if (value < 1024 * 1024) return `${Math.round(value / 102.4) / 10} Ko`;
      return `${Math.round(value / 104857.6) / 10} Mo`;
    }

    function getDocumentPreview(documentItem) {

    function sortSteps(a, b) {
      const aDate = `${a.date || ""} ${a.time || "23:59"}`;
      const bDate = `${b.date || ""} ${b.time || "23:59"}`;
      return aDate.localeCompare(bDate);
    }

    function groupStepsByDay() {
      const map = new Map();
      [...state.trip.steps].sort(sortSteps).forEach((step) => {
        const key = step.date || "date-libre";
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(step);
      });
      return Array.from(map.entries());
    }

    function inferDayFromDate(dateStr) {
      const target = String(dateStr || "").trim();
      if (!target) return "";
      const date = new Date(target);
      if (Number.isNaN(date.getTime())) return "";
      return formatCapitalizedDate(date, DATE_FORMATTERS.longDay);
    }

    function parseStepDateTime(step) {
      const datePart = step?.date || "";
      const timePart = step?.time || "12:00";
      if (!datePart) return null;
      const parsed = new Date(`${datePart}T${timePart}`);
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function getCurrentReferenceDate() {
      return new Date();
    }

    function getStepEndDateTime(step) {
      const start = parseStepDateTime(step);
      if (!start) return null;
      const duration = Number(step?.duration || 0);
      return new Date(start.getTime() + (duration > 0 ? duration : 60) * 60000);
    }

    function getStepCoordinates(step) {
      const place = findMatchingPlaceForStep(step);
      const lat = Number(place?.latitude);
      const lon = Number(place?.longitude);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
      return { lat, lon, place };
    }

    function haversineKm(a, b) {
      const toRad = (value) => value * Math.PI / 180;
      const earthRadiusKm = 6371;
      const deltaLat = toRad(b.lat - a.lat);
      const deltaLon = toRad(b.lon - a.lon);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const sinLat = Math.sin(deltaLat / 2);
      const sinLon = Math.sin(deltaLon / 2);
      const h = (sinLat ** 2) + (Math.cos(lat1) * Math.cos(lat2) * (sinLon ** 2));
      return 2 * earthRadiusKm * Math.asin(Math.sqrt(h));
    }

    function estimateTravelSegment(fromStep, toStep) {
      const fromCoords = getStepCoordinates(fromStep);
      const toCoords = getStepCoordinates(toStep);
      const fromTime = getStepEndDateTime(fromStep);
      const toTime = parseStepDateTime(toStep);
      const availableMinutes = fromTime && toTime ? Math.max(0, Math.round((toTime.getTime() - fromTime.getTime()) / 60000)) : null;

      if (!fromCoords || !toCoords) {
        return {
          mode: "inconnu",
          minutes: null,
          availableMinutes,
          distanceKm: null,
          label: "Trajet à confirmer"
        };
      }

      const distanceKm = haversineKm(fromCoords, toCoords);
      const recommendedMode = distanceKm <= 2 ? "walking" : (distanceKm <= 7 ? "transit" : "taxi");
      const speedKmH = recommendedMode === "walking" ? 4.8 : (recommendedMode === "transit" ? 18 : 28);
      const bufferMinutes = recommendedMode === "walking" ? 4 : (recommendedMode === "transit" ? 10 : 6);
      const minutes = Math.max(4, Math.round((distanceKm / speedKmH) * 60) + bufferMinutes);
      const modeLabel = recommendedMode === "walking" ? "à pied" : (recommendedMode === "transit" ? "en transport" : "en taxi");
      return {
        mode: recommendedMode,
        minutes,
        availableMinutes,
        distanceKm,
        label: `${minutes} min ${modeLabel}`
      };
    }

    function getDaySegments(steps) {
      const segments = [];
      for (let index = 0; index < steps.length - 1; index += 1) {
        segments.push({
          from: steps[index],
          to: steps[index + 1],
          ...estimateTravelSegment(steps[index], steps[index + 1])
        });
      }
      return segments;
    }

    function getTimelineContext() {
      const steps = [...state.trip.steps].sort(sortSteps);
      const activeSteps = steps.filter((step) => !step.done);
      const now = getCurrentReferenceDate();
      const current = activeSteps.find((step) => {
        const start = parseStepDateTime(step);
        const end = getStepEndDateTime(step);
        return start && end && now >= start && now <= end;
      }) || null;
      const upcoming = activeSteps.find((step) => {
        const start = parseStepDateTime(step);
        return start && start > now;
      }) || null;
      const completedCount = steps.filter((step) => step.done).length;
      return {
        now,
        current,
        upcoming,
        completedCount,
        remainingCount: Math.max(0, steps.length - completedCount),
        progress: steps.length ? Math.round((completedCount / steps.length) * 100) : 0
      };
    }

    function formatRelativeStepTime(step) {
      const start = parseStepDateTime(step);
      if (!start) return "Horaire libre";
      const deltaMinutes = Math.round((start.getTime() - getCurrentReferenceDate().getTime()) / 60000);
      if (Math.abs(deltaMinutes) < 1) return "En ce moment";
      if (deltaMinutes > 0 && deltaMinutes < 60) return `Dans ${deltaMinutes} min`;
      if (deltaMinutes > 0 && deltaMinutes < 24 * 60) {
        const hours = Math.floor(deltaMinutes / 60);
        const mins = deltaMinutes % 60;
        return mins ? `Dans ${hours} h ${mins}` : `Dans ${hours} h`;
      }
      if (deltaMinutes < 0 && Math.abs(deltaMinutes) < 60) return `Commencée il y a ${Math.abs(deltaMinutes)} min`;
      return `${formatDayHeading(step.date || "")} · ${step.time || "--:--"}`;
    }

    function getClosestCurrentWeatherFromHourly(weather) {
      const slots = Object.values(weather?.hourly || {}).flat();
      if (!slots.length) return null;
      const now = Date.now();
      let closest = null;
      let bestDelta = Number.POSITIVE_INFINITY;
      slots.forEach((slot) => {
        const slotTime = new Date(slot.time).getTime();
        if (Number.isNaN(slotTime)) return;
        const delta = Math.abs(slotTime - now);
        if (delta < bestDelta) {
          bestDelta = delta;
          closest = slot;
        }
      });
      if (!closest) return null;
      return {
        time: closest.time,
        temp: closest.temp,
        code: closest.code,
        label: getWeatherLabel(closest.code)
      };
    }
