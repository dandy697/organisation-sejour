    function upsertDocument(documentItem) {
      const index = state.documents.findIndex((item) => item.id === documentItem.id);
      if (index >= 0) {
        state.documents[index] = documentItem;
      } else {
        state.documents.unshift(documentItem);
      }
      const saved = saveDocuments();
      if (!saved) {
        setFeedback("Impossible d'enregistrer ce document localement. Essayez un fichier plus léger.", "error");
      }
      return saved;
    }

    function deleteDocument(id) {
      state.documents = state.documents.filter((item) => item.id !== id);
      saveDocuments();
      setFeedback("Document supprimé.", "success");
      renderApp();
    }

    function openDocument(id) {
      const documentItem = state.documents.find((item) => item.id === id);
      if (!documentItem) return;
      const targetUrl = documentItem.fileDataUrl || documentItem.externalUrl;
      if (!targetUrl) {
        setFeedback("Aucun fichier ou lien à ouvrir pour ce document.", "error");
        renderApp();
        return;
      }

      if (documentItem.fileDataUrl) {
        try {
          const blobUrl = createObjectUrlFromDataUrl(documentItem.fileDataUrl, documentItem.mimeType);
          const popup = window.open(blobUrl, "_blank", "noopener,noreferrer");
          if (!popup) {
            setFeedback("Le navigateur a bloqué l'ouverture du document.", "error");
            renderApp();
            return;
          }
          window.setTimeout(() => URL.revokeObjectURL(blobUrl), 60 * 1000);
          return;
        } catch (error) {
          setFeedback("Impossible d'ouvrir ce document local.", "error");
          renderApp();
          return;
        }
      }

      const link = document.createElement("a");
      link.href = targetUrl;
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      link.click();
    }

    function createObjectUrlFromDataUrl(dataUrl, mimeType = "") {
      const parts = String(dataUrl || "").split(",");
      if (parts.length < 2) throw new Error("invalid-data-url");
      const meta = parts[0] || "";
      const binary = atob(parts[1]);
      const array = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        array[i] = binary.charCodeAt(i);
      }
      const resolvedType = mimeType || (meta.match(/data:([^;]+)/)?.[1] || "application/octet-stream");
      return URL.createObjectURL(new Blob([array], { type: resolvedType }));
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error("file-read-failed"));
        reader.readAsDataURL(file);
      });
    }

    async function loadImageElementFromSource(source) {
      return await new Promise((resolve, reject) => {
        const image = new Image();
        image.decoding = "async";
        image.referrerPolicy = "no-referrer";
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("image-load-failed"));
        image.src = source;
      });
    }

    async function optimizeImageSourceToDataUrl(source, { maxWidth = 320, maxHeight = 320, quality = 0.6 } = {}) {
      const input = String(source || "").trim();
      if (!input) return "";

      try {
        const image = await loadImageElementFromSource(input);
        const ratio = Math.min(maxWidth / image.naturalWidth, maxHeight / image.naturalHeight, 1);
        const width = Math.max(1, Math.round(image.naturalWidth * ratio));
        const height = Math.max(1, Math.round(image.naturalHeight * ratio));

        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d", { alpha: false });
        if (!ctx) return input;

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(image, 0, 0, width, height);

        let output = canvas.toDataURL("image/jpeg", quality);
        if (output.length > 120000) {
          output = canvas.toDataURL("image/jpeg", 0.5);
        }
        return output;
      } catch (error) {
        return input;
      }
    }

    async function optimizeRemoteImageDataUrl(url, { maxWidth = 320, maxHeight = 320, quality = 0.6 } = {}) {
      const source = String(url || "").trim();
      if (!source) return "";

      try {
        const response = await safeFetch(source, { headers: { Accept: "image/*,*/*;q=0.8" } }, 12000);
        const blob = await response.blob();
        const objectUrl = URL.createObjectURL(blob);
        try {
          return await optimizeImageSourceToDataUrl(objectUrl, { maxWidth, maxHeight, quality });
        } finally {
          URL.revokeObjectURL(objectUrl);
        }
      } catch (error) {
        return source;
      }
    }

    async function optimizeStoredPlaceImages() {
      if (state.runtime.imageOptimizationPromise) return state.runtime.imageOptimizationPromise;

      state.runtime.imageOptimizationPromise = (async () => {
        let changed = false;
        for (const place of state.trip.places) {
          const imageUrl = String(place.imageUrl || "");
          if (!imageUrl.startsWith("data:image/")) continue;
          if (imageUrl.length <= 120000) continue;

          const optimized = await optimizeImageSourceToDataUrl(imageUrl, {
            maxWidth: 320,
            maxHeight: 320,
            quality: 0.5
          });

          if (optimized && optimized !== imageUrl) {
            place.imageUrl = optimized;
            changed = true;
          }
        }

        if (changed) {
          saveTrip();
          renderApp();
        }
      })();

      try {
        await state.runtime.imageOptimizationPromise;
      } finally {
        state.runtime.imageOptimizationPromise = null;
      }
    }

    function bindEvents() {
      document.querySelectorAll("[data-action]").forEach((element) => {
        const action = element.dataset.action;
        if (action === "import-file" || element._bound) return;
        element._bound = true;
        element.addEventListener("click", handleAction);
      });

      const stepForm = document.getElementById("step-form");
      if (stepForm) {
        stepForm.addEventListener("submit", onSubmitStepForm);
      }

      const stepPlaceSelect = document.getElementById("step-place-id");
      if (stepPlaceSelect && !stepPlaceSelect._boundChange) {
        stepPlaceSelect._boundChange = true;
        stepPlaceSelect.addEventListener("change", onStepPlaceChange);
      }

      const tripSettingsForm = document.getElementById("trip-settings-form");
      if (tripSettingsForm) {
        tripSettingsForm.addEventListener("submit", onSubmitTripSettings);
      }

      const placeManualForm = document.getElementById("place-manual-form");
      if (placeManualForm) {
        placeManualForm.addEventListener("submit", onSubmitPlaceManualForm);
      }

      const placeEditForm = document.getElementById("place-edit-form");
      if (placeEditForm) {
        placeEditForm.addEventListener("submit", onSubmitPlaceEditForm);
      }

      const documentForm = document.getElementById("document-form");
      if (documentForm) {
        documentForm.addEventListener("submit", onSubmitDocumentForm);
      }

      const placeSearchInput = document.getElementById("place-search");
      if (placeSearchInput) {
        const syncSearchSelection = (event) => {
          state.ui.placeSearchSelectionStart = event.target.selectionStart ?? null;
          state.ui.placeSearchSelectionEnd = event.target.selectionEnd ?? null;
        };
        placeSearchInput.addEventListener("input", (event) => {
          state.ui.placeSearchQuery = event.target.value;
          syncSearchSelection(event);
          debouncedPlaceSearch(event.target.value);
        });
        placeSearchInput.addEventListener("keyup", syncSearchSelection);
        placeSearchInput.addEventListener("click", syncSearchSelection);
        placeSearchInput.addEventListener("select", syncSearchSelection);
      }

      const importInput = document.getElementById(state.ui.importInputId);
      if (importInput) {
        importInput.addEventListener("change", (event) => {
          importTrip(event.target.files[0]);
          event.target.value = "";
        });
      }
    }

    async function handleAction(event) {
      event.preventDefault();
      const target = event.currentTarget;
      if (typeof target.blur === "function") {
        target.blur();
      }
      const action = target.dataset.action;
      const id = target.dataset.id;
      const url = target.dataset.url;
      const tab = target.dataset.tab;

      if (action === "switch-tab") {
        state.activeTab = tab;
        renderApp();
        scrollToTop();
      }
      if (action === "set-map-day") {
        state.ui.mapDayFilter = target.dataset.day || "all";
        renderApp();
      }
      if (action === "open-trip-settings") openModal("trip-settings");
      if (action === "set-theme") setTheme(target.dataset.theme);
      if (action === "add-step") openModal("step-form");
      if (action === "edit-step") openModal("step-form", { stepId: id });
      if (action === "assign-place-day") openModal("step-form", { placeId: id });
      if (action === "select-search-result-step") await selectSearchResultForStep(Number(target.dataset.index));
      if (action === "add-place") openModal("add-place");
      if (action === "edit-place") openModal("edit-place", { placeId: id });
      if (action === "add-document") openModal("document-form");
      if (action === "edit-document") openModal("document-form", { documentId: id });
      if (action === "close-modal") closeModal();
      if (action === "close-modal-backdrop") closeModal();
      if (action === "delete-step" && confirm("Supprimer cette étape ?")) deleteStep(id);
      if (action === "delete-place" && confirm("Supprimer ce lieu ?")) deletePlace(id);
      if (action === "delete-document" && confirm("Supprimer ce document local ?")) deleteDocument(id);
      if (action === "toggle-step-done") toggleStepDone(id);
      if (action === "move-step-up") moveStep(id, "up");
      if (action === "move-step-down") moveStep(id, "down");
      if (action === "open-step-maps" || action === "open-external") window.open(url, "_blank", "noopener");
      if (action === "open-place-route") openPlaceRoute(id);
      if (action === "open-document") openDocument(id);
      if (action === "copy-summary") await copySummary();
      if (action === "copy-app-link") await copyAppLink();
      if (action === "share-trip") await shareTrip();
      if (action === "new-trip" && confirm("Créer un nouveau séjour vide et remplacer le séjour actuel sur cet appareil ?")) createEmptyTrip();
      if (action === "export-trip") exportTrip();
      if (action === "reset-trip" && confirm("Réinitialiser le voyage et remplacer vos modifications locales ?")) resetTrip();
      if (action === "refresh-place") await refreshPlace(id);
      if (action === "select-search-result") await selectSearchResult(Number(target.dataset.index));
      if (action === "clear-place-image") {
        const inputId = target.dataset.target;
        const input = inputId ? document.getElementById(inputId) : null;
        if (input) {
          input.value = "";
          input.focus({ preventScroll: true });
        }
      }
    }

    function toggleStepDone(id) {
      const step = state.trip.steps.find((item) => item.id === id);
      if (!step) return;
      step.done = !step.done;
      saveTrip();
      renderApp();
    }

    function openPlaceRoute(id) {
      const place = state.trip.places.find((item) => item.id === id);
      const firstStep = [...state.trip.steps].sort(sortSteps)[0];
      if (!place) return;
      const origin = firstStep?.address || state.trip.info.hotel || state.trip.meta.destination || "";
      const destination = place.address || place.name;
      window.open(buildGoogleMapsNavigateUrl(origin, destination, "walking"), "_blank", "noopener");
    }

    async function refreshPlace(id) {
      const place = state.trip.places.find((item) => item.id === id);
      if (!place) return;
      const scrollY = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;
      state.ui.isEnrichingPlace = true;
      state.ui.enrichingPlaceId = id;
      renderApp();
      restorePlaceCardIntoView(id, scrollY);
      try {
        const enriched = await enrichPlaceAutomatically({ ...place });
        upsertPlace({
          ...place,
          ...enriched,
          googleMapsUrl: place.googleMapsUrl || buildGoogleMapsSearchUrl(place.address || place.name)
        });
        setFeedback(enriched.sourceBadge === "Cache" ? "Données chargées depuis le cache." : "Lieu enrichi automatiquement.", "success");
      } catch (error) {
        setFeedback("Impossible de récupérer l'histoire du lieu. Vous pouvez compléter la fiche manuellement.", "error");
      } finally {
        state.ui.isEnrichingPlace = false;
        state.ui.enrichingPlaceId = null;
        renderApp();
        restorePlaceCardIntoView(id, scrollY);
      }
    }

    function onSubmitTripSettings(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      state.trip.meta = {
        title: form.get("title"),
        destination: form.get("destination"),
        startDate: form.get("startDate"),
        endDate: form.get("endDate"),
        companion: form.get("companion"),
        localId: state.trip.meta.localId || uid()
      };
      saveTrip();
      closeModal();
      setFeedback("Informations du séjour enregistrées.", "success");
      renderApp();
    }

    function onSubmitStepForm(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const id = event.currentTarget.dataset.stepId || uid();
      const placeId = String(form.get("placeId") || "").trim() || null;
      const linkedPlace = placeId ? state.trip.places.find((item) => item.id === placeId) || null : null;
      const address = String(form.get("address") || linkedPlace?.address || "");
      const title = String(form.get("title") || linkedPlace?.name || "");
      const rawDate = String(form.get("date") || "").trim();
      const resolvedDate = rawDate || state.trip.meta.startDate || "";
      const resolvedDay = inferDayFromDate(resolvedDate) || "Jour";
      const nextStep = ensurePlaceLinkedForStep({
        id,
        day: resolvedDay,
        date: resolvedDate,
        time: form.get("time"),
        title,
        type: form.get("type"),
        address,
        note: form.get("note"),
        cost: Number(form.get("cost") || 0),
        duration: parseDurationInput(form.get("duration")),
        googleMapsUrl: buildGoogleMapsSearchUrl(address || title || linkedPlace?.address || linkedPlace?.name || ""),
        description: form.get("description"),
        historyText: form.get("historyText"),
        anecdote: form.get("anecdote"),
        practicalTip: form.get("practicalTip"),
        done: state.trip.steps.find((item) => item.id === id)?.done || false,
        placeId
      });
      upsertStep(nextStep);
      closeModal();
      setFeedback("Étape enregistrée.", "success");
      renderApp();
    }

    function onStepPlaceChange(event) {
      const placeId = String(event.target.value || "").trim();
      const place = placeId ? state.trip.places.find((item) => item.id === placeId) || null : null;
      if (!place) return;

      const titleInput = document.getElementById("step-title");
      const addressInput = document.getElementById("step-address");
      const durationInput = document.getElementById("step-duration");
      const costInput = document.getElementById("step-cost");
      const descriptionInput = document.getElementById("step-description");
      const historyInput = document.getElementById("step-history");
      const anecdoteInput = document.getElementById("step-anecdote");
      const tipInput = document.getElementById("step-tip");
      const currentCost = costInput ? Number(costInput.value || 0) : NaN;

      if (titleInput && !String(titleInput.value || "").trim()) titleInput.value = place.name || "";
      if (addressInput && !String(addressInput.value || "").trim()) addressInput.value = place.address || "";
      if (durationInput && !String(durationInput.value || "").trim() && place.recommendedDuration) durationInput.value = formatDurationInputValue(place.recommendedDuration);
      if (costInput && (!String(costInput.value || "").trim() || currentCost === 0) && Number(place.estimatedCost || 0) > 0) costInput.value = String(place.estimatedCost);
      if (descriptionInput && !String(descriptionInput.value || "").trim()) descriptionInput.value = place.shortDescription || "";
      if (historyInput && !String(historyInput.value || "").trim()) historyInput.value = place.historyText || "";
      if (anecdoteInput && !String(anecdoteInput.value || "").trim()) anecdoteInput.value = place.anecdote || "";
      if (tipInput && !String(tipInput.value || "").trim()) tipInput.value = place.practicalTip || "";
    }

    async function onSubmitPlaceManualForm(event) {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const place = {
        id: uid(),
        name: String(form.get("name") || "").trim(),
        address: String(form.get("address") || "").trim(),
        latitude: String(form.get("latitude") || "").trim(),
        longitude: String(form.get("longitude") || "").trim(),
        type: String(form.get("type") || "").trim(),
        category: "",
        googleMapsUrl: buildGoogleMapsSearchUrl(String(form.get("address") || form.get("name") || "")),
        shortDescription: String(form.get("shortDescription") || "").trim(),
        imageUrl: String(form.get("imageUrl") || "").trim(),
        imageAlt: String(form.get("name") || "").trim(),
        historyText: String(form.get("historyText") || "").trim(),
        anecdote: "",
        practicalTip: "",
        recommendedDuration: 60,
        estimatedCost: 0,
        personalNote: "",
        wikiTitle: "",
        wikiUrl: "",
        sourceLang: "fr",
        sourceBadge: state.ui.selectedPlaceDraft ? state.ui.selectedPlaceDraft.sourceBadge || "Auto" : "Manuel"
      };
      upsertPlace(place);
      closeModal();
      setFeedback("Lieu enregistré.", "success");
      renderApp();
    }

    function onSubmitPlaceEditForm(event) {
      event.preventDefault();
      const id = event.currentTarget.dataset.placeId;
      const existing = state.trip.places.find((item) => item.id === id);
      if (!existing) return;
      const form = new FormData(event.currentTarget);
      upsertPlace({
        ...existing,
        name: form.get("name"),
        address: form.get("address"),
        latitude: form.get("latitude"),
        longitude: form.get("longitude"),
        type: form.get("type"),
        category: form.get("category"),
        recommendedDuration: parseDurationInput(form.get("recommendedDuration")),
        estimatedCost: Number(form.get("estimatedCost") || 0),
        shortDescription: form.get("shortDescription"),
        imageUrl: String(form.get("imageUrl") || "").trim(),
        imageAlt: String(form.get("name") || "").trim() || existing.imageAlt || existing.name || "",
        historyText: form.get("historyText"),
        anecdote: form.get("anecdote"),
        practicalTip: form.get("practicalTip"),
        personalNote: form.get("personalNote"),
        wikiUrl: form.get("wikiUrl"),
        googleMapsUrl: buildGoogleMapsSearchUrl(String(form.get("address") || form.get("name") || "")),
        sourceBadge: existing.sourceBadge || "Manuel"
      });
      closeModal();
      setFeedback("Lieu mis à jour.", "success");
      renderApp();
    }

    async function onSubmitDocumentForm(event) {
      event.preventDefault();
      const formElement = event.currentTarget;
      const id = formElement.dataset.documentId || uid();
      const existing = state.documents.find((item) => item.id === id) || null;
      const form = new FormData(formElement);
      const file = form.get("file");
      const nextDocument = {
        id,
        kind: String(form.get("kind") || "autre"),
        title: String(form.get("title") || "").trim(),
        date: String(form.get("date") || "").trim(),
        reference: String(form.get("reference") || "").trim(),
        note: String(form.get("note") || "").trim(),
        externalUrl: String(form.get("externalUrl") || "").trim(),
        fileName: existing?.fileName || "",
        fileSize: existing?.fileSize || 0,
        mimeType: existing?.mimeType || "",
        fileDataUrl: existing?.fileDataUrl || ""
      };

      if (file && typeof file === "object" && file.size) {
        if (file.size > 2.2 * 1024 * 1024) {
          setFeedback("Le fichier est trop lourd pour le stockage local. Essayez une image ou un PDF plus leger.", "error");
          renderApp();
          return;
        }
        try {
          nextDocument.fileDataUrl = await readFileAsDataUrl(file);
          nextDocument.fileName = file.name;
          nextDocument.fileSize = file.size;
          nextDocument.mimeType = file.type || "";
        } catch (error) {
          setFeedback("Impossible de lire ce fichier. Réessayez avec une autre pièce jointe.", "error");
          renderApp();
          return;
        }
      }

      const saved = upsertDocument(nextDocument);
      if (!saved) {
        renderApp();
        return;
      }

      closeModal();
      setFeedback(existing ? "Document mis à jour." : "Document ajouté.", "success");
      renderApp();
    }

    const debouncedPlaceSearch = debounce(async (rawQuery) => {
      const query = String(rawQuery || "").trim();
      if (query.length < 3) {
        state.ui.placeSearchResults = [];
        state.ui.placeSearchStatus = query ? "Saisissez au moins 3 caractères." : "";
        rerenderWithPlaceSearchFocus();
        return;
      }

      state.ui.isSearchingPlaces = true;
      state.ui.placeSearchStatus = "Recherche du lieu...";
      rerenderWithPlaceSearchFocus();

      try {
        const { results, source } = await searchPlaceNominatim(query);
        state.ui.placeSearchResults = Array.isArray(results) ? results : [];
        if (!results.length) state.ui.placeSearchStatus = "Aucun résultat trouvé";
        else if (source === "cache") state.ui.placeSearchStatus = "Données chargées depuis le cache";
        else state.ui.placeSearchStatus = `${results.length} résultat${results.length > 1 ? "s" : ""} trouvé${results.length > 1 ? "s" : ""}`;
      } catch (error) {
        state.ui.placeSearchResults = [];
        state.ui.placeSearchStatus = navigator.onLine ? "Impossible de rechercher ce lieu pour le moment" : "Vous semblez hors ligne. Vous pouvez compléter la fiche manuellement.";
      } finally {
        state.ui.isSearchingPlaces = false;
        rerenderWithPlaceSearchFocus();
      }
    }, SEARCH_DEBOUNCE_MS);

    function createPlaceDraftFromSearchResult(selected) {
      if (!selected) return null;
      return {
        id: uid(),
        name: selected.namedetails?.name || selected.display_name?.split(",")[0] || "Lieu",
        address: selected.display_name || "",
        latitude: selected.lat || "",
        longitude: selected.lon || "",
        type: selected.type || selected.class || "lieu",
        category: selected.class || "",
        googleMapsUrl: buildGoogleMapsSearchUrl(selected.display_name || ""),
        shortDescription: "",
        imageUrl: "",
        imageAlt: selected.namedetails?.name || selected.display_name?.split(",")[0] || "Lieu",
        historyText: "",
        anecdote: "",
        practicalTip: "",
        recommendedDuration: 60,
        estimatedCost: 0,
        personalNote: "",
        wikiTitle: "",
        wikiUrl: "",
        sourceLang: "fr",
        sourceBadge: "Auto"
      };
    }

    async function enrichAndSavePlaceDraft(draft) {
      state.ui.selectedPlaceDraft = draft;
      state.ui.placeSearchStatus = "Enrichissement automatique du lieu...";
      renderApp();

      try {
        const enriched = await enrichPlaceAutomatically(draft);
        state.ui.selectedPlaceDraft = enriched;
        upsertPlace(enriched);
        return enriched;
      } catch (error) {
        state.ui.selectedPlaceDraft = draft;
        renderApp();
        throw error;
      }
    }

    async function selectSearchResult(index) {
      const selected = state.ui.placeSearchResults[index];
      if (!selected) return;

      const draft = createPlaceDraftFromSearchResult(selected);
      if (!draft) return;

      try {
        const enriched = await enrichAndSavePlaceDraft(draft);
        closeModal();
        const successMessage = {
          cache: "Lieu ajouté avec données déjà connues.",
          auto: "Lieu ajouté avec enrichissement automatique.",
          "no-match": "Lieu ajouté, mais aucune fiche Wikipedia claire n'a été trouvée.",
          "summary-unavailable": "Lieu ajouté, mais le résumé automatique n'était pas disponible."
        }[enriched.enrichmentStatus] || "Lieu ajouté.";
        setFeedback(successMessage, enriched.enrichmentStatus === "auto" || enriched.enrichmentStatus === "cache" ? "success" : "info");
      } catch (error) {
        setFeedback("Lieu non enrichi pour le moment à cause d'un problème de connexion ou de service externe. Vous pouvez compléter la fiche manuellement.", "error");
      }
    }

    async function selectSearchResultForStep(index) {
      const selected = state.ui.placeSearchResults[index];
      if (!selected) return;

      const draft = createPlaceDraftFromSearchResult(selected);
      if (!draft) return;

      try {
        const enriched = await enrichAndSavePlaceDraft(draft);
        openModal("step-form", { placeId: enriched.id });
        setFeedback("Lieu trouve. Choisissez maintenant le jour et enregistrez l'etape.", "success");
      } catch (error) {
        setFeedback("Impossible de preparer ce lieu pour la timeline pour le moment. Vous pouvez toujours le sauvegarder manuellement.", "error");
      }
    }

    function buildRouteUrlFromStops(stops, travelMode = "walking") {
      const cleanStops = stops.filter(Boolean);
      if (cleanStops.length < 2) return "";
      const origin = cleanStops[0];
      const destination = cleanStops[cleanStops.length - 1];
      const waypoints = cleanStops.slice(1, -1).slice(0, 8);
      let url = buildGoogleMapsNavigateUrl(origin, destination, travelMode);
      if (waypoints.length) {
        url += `&waypoints=${encodeURIComponent(waypoints.join("|"))}`;
      }
      return url.length <= 1900 ? url : "";
    }

    function buildDayRouteUrl(dayKey = "all") {
      const steps = dayKey === "all" ? getUpcomingSteps() : getStepsForMapDay(dayKey);
      if (steps.length < 2) return "";
      const day = dayKey === "all" ? (steps[0].date || steps[0].day) : dayKey;
      const dayStops = steps
        .filter((step) => (step.date || step.day) === day)
        .map((step) => step.address || step.title)
        .filter(Boolean);
      return buildRouteUrlFromStops(dayStops, "walking");
    }

    function buildAllRouteUrl() {
      const allStops = [...state.trip.steps]
        .sort(sortSteps)
        .map((step) => step.address || step.title)
        .filter(Boolean);
      return buildRouteUrlFromStops(allStops, "walking");
    }

    function injectManifest() {
      const manifest = {
        name: state.trip.meta.title || "Mon séjour",
        short_name: "Sejour",
        display: "standalone",
        start_url: "./",
        background_color: "#121212",
        theme_color: "#121212",
        description: "Application personnelle de voyage et week-end sans backend.",
        icons: [
          {
            src: generateIconDataUrl(),
            sizes: "192x192",
            type: "image/png"
          },
          {
            src: generateIconDataUrl(),
            sizes: "512x512",
            type: "image/png"
          }
        ]
      };
      let link = document.getElementById("dynamic-manifest");
      if (!link) {
        link = document.createElement("link");
        link.rel = "manifest";
        link.id = "dynamic-manifest";
        document.head.appendChild(link);
      }
      if (state.runtime.manifestUrl) {
        URL.revokeObjectURL(state.runtime.manifestUrl);
      }
      state.runtime.manifestUrl = URL.createObjectURL(new Blob([JSON.stringify(manifest)], { type: "application/json" }));
      link.href = state.runtime.manifestUrl;
    }

    async function registerServiceWorker() {
      if (!("serviceWorker" in navigator)) return;
      if (!(window.isSecureContext || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1")) return;
      try {
        const registration = await navigator.serviceWorker.register("./sw.js");
        if (registration.waiting || registration.active) {
          return;
        }
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          setFeedback("Mode hors ligne pret apres cette premiere visite.", "success");
          renderApp();
        });
      } catch (error) {
        // Ne jamais bloquer l'app si l'enregistrement PWA echoue.
      }
    }

    function generateIconDataUrl() {
      const canvas = document.createElement("canvas");
      canvas.width = 192;
      canvas.height = 192;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createLinearGradient(24, 18, 168, 174);
      gradient.addColorStop(0, "#2563eb");
      gradient.addColorStop(1, "#7dd3fc");
      ctx.fillStyle = "#f7f9fc";
      ctx.fillRect(0, 0, 192, 192);
      ctx.fillStyle = gradient;
      if (typeof ctx.roundRect === "function") {
        ctx.beginPath();
        ctx.roundRect(24, 24, 144, 144, 36);
        ctx.fill();
      } else {
        ctx.fillRect(24, 24, 144, 144);
      }
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.moveTo(96, 48);
      ctx.bezierCurveTo(78, 48, 66, 61, 66, 77);
      ctx.bezierCurveTo(66, 99, 96, 124, 96, 124);
      ctx.bezierCurveTo(96, 124, 126, 99, 126, 77);
      ctx.bezierCurveTo(126, 61, 114, 48, 96, 48);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#2563eb";
      ctx.beginPath();
      ctx.arc(96, 79, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.92)";
      ctx.lineWidth = 8;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(56, 129);
      ctx.quadraticCurveTo(96, 103, 136, 129);
      ctx.stroke();
      return canvas.toDataURL("image/png");
    }

    function escapeHtml(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }

    if (syncPlacesFromSteps()) {
      saveTrip();
    }

    renderApp();
    optimizeStoredPlaceImages();
    registerServiceWorker();
  </script>
</body>
</html>
