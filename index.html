            <path d="M15 25h18a7 7 0 0 0 .5-14A10 10 0 0 0 15 13a6 6 0 0 0 0 12Z" fill="#ffffff" stroke="#d7dfef" stroke-width="2"></path>
            <g stroke="#cbd5e1" stroke-linecap="round" stroke-width="2.6">
              <path d="M12 32h24"></path>
              <path d="M15 37h18"></path>
            </g>
          </svg>
        `,
        snow: `
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path d="M16 28h18a8 8 0 0 0 .5-16A11 11 0 0 0 14 13a7.5 7.5 0 0 0 2 15Z" fill="#ffffff" stroke="#d7dfef" stroke-width="2"></path>
            <g stroke="#93c5fd" stroke-linecap="round" stroke-width="2.4">
              <path d="M18 34v8"></path>
              <path d="M14 38h8"></path>
              <path d="M27 34v8"></path>
              <path d="M23 38h8"></path>
            </g>
          </svg>
        `
      };
      return icons[kind] || icons.cloud;
    }

    function isNightWeatherTime(isoString) {
      if (!isoString) return false;
      const match = String(isoString).match(/T(\d{2}):(\d{2})/);
      if (!match) return false;
      const hour = Number(match[1]);
      return Number.isFinite(hour) && (hour >= 20 || hour < 6);
    }

    function getWeatherMomentPrefix(isoString) {
      const match = String(isoString || "").match(/T(\d{2}):(\d{2})/);
      if (!match) return "Maintenant";
      const hour = Number(match[1]);
      if (!Number.isFinite(hour)) return "Maintenant";
      if (hour >= 20 || hour < 6) return "Cette nuit";
      if (hour >= 18) return "Ce soir";
      return "Maintenant";
    }

    function getWeatherIconForMoment(code, isoString) {
      const weatherCode = Number(code);
      if (!isNightWeatherTime(isoString)) return getWeatherIcon(weatherCode);
      return ({
        0: "🌙",
        1: "🌙",
        2: "☁️",
        3: "☁️",
        45: "🌫️",
        48: "🌫️",
        51: "🌧️",
        53: "🌧️",
        55: "🌧️",
        61: "🌧️",
        63: "🌧️",
        65: "🌧️",
        71: "❄️",
        80: "🌧️",
        81: "🌧️",
        82: "⛈️",
        95: "⛈️"
      }[weatherCode] || getWeatherIcon(weatherCode));
    }

    function getWeatherIconMarkup(code, isoString = "") {
      const weatherCode = Number(code);
      const night = isNightWeatherTime(isoString);
      const kind = ({
        0: night ? "moon" : "sun",
        1: night ? "moon" : "sunCloud",
        2: night ? "moonCloud" : "sunCloud",
        3: "cloud",
        45: "fog",
        48: "fog",
        51: "rain",
        53: "rain",
        55: "rain",
        61: "rain",
        63: "rain",
        65: "rain",
        71: "snow",
        80: "rain",
        81: "rain",
        82: "storm",
        95: "storm"
      }[weatherCode] || "cloud");
      return renderWeatherIconSvg(kind);
    }

    function getWeatherIconFromLabel(label) {
      const normalized = normalizeCacheKey(label);
      if (normalized.includes("soleil")) return "☀️";
      if (normalized.includes("degage")) return "🌤️";
      if (normalized.includes("eclaircies")) return "⛅";
      if (normalized.includes("couvert")) return "☁️";
      if (normalized.includes("brume")) return "🌫️";
      if (normalized.includes("bruine")) return "🌦️";
      if (normalized.includes("pluie")) return "🌧️";
      if (normalized.includes("averse")) return "🌦️";
      if (normalized.includes("orage")) return "⛈️";
      if (normalized.includes("neige")) return "❄️";
      return "🌡️";
    }

    function getWeatherSummaryForDay(dateKey) {
      const weather = getCachedWeather();
      if (!weather?.days?.[dateKey]) return null;
      return weather.days[dateKey];
    }

    function formatWeatherUpdatedAt(isoString) {
      if (!isoString) return "";
      const parsed = new Date(isoString);
      if (Number.isNaN(parsed.getTime())) return "";
      return DATE_FORMATTERS.shortTime.format(parsed);
    }

    function formatWeatherSlotLabel(isoString) {
      if (!isoString) return "";
      const parsed = new Date(isoString);
      if (Number.isNaN(parsed.getTime())) return "";
      return DATE_FORMATTERS.shortTime.format(parsed);
    }

    function getWeatherLiveSnapshot(dateKey) {
      const weather = getCachedWeather();
      if (!weather) return null;
      const currentWeather = weather.current || getClosestCurrentWeatherFromHourly(weather);
      const dayHourly = weather.hourly?.[dateKey] || [];
      const nextHourRaw = dayHourly.find((slot) => {
        const slotTime = new Date(slot.time);
        return !Number.isNaN(slotTime.getTime()) && slotTime >= new Date();
      }) || dayHourly[0] || null;
      const nextHourLabel = nextHourRaw ? formatWeatherSlotLabel(nextHourRaw.time) : "";
      const nextHour = nextHourLabel === "00:00" ? null : nextHourRaw;

      return {
        current: currentWeather,
        nextHour,
        updatedAt: weather.updatedAt || currentWeather?.time || ""
      };
    }

    async function ensureWeatherLoaded(forceRefresh = false) {
      const key = buildWeatherCacheKey();
      if (!key || !state.trip.meta.destination || state.runtime.weatherLoading || (!forceRefresh && getCachedWeather())) return;
      state.runtime.weatherLoading = true;
      state.runtime.weatherKey = key;
      try {
        const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(state.trip.meta.destination)}&count=1&language=fr&format=json`;
        const geoResponse = await safeFetch(geoUrl, {}, 12000);
        const geoData = await geoResponse.json();
        const first = Array.isArray(geoData.results) ? geoData.results[0] : null;
        if (!first) return;
        const startDate = state.trip.meta.startDate || new Date().toISOString().slice(0, 10);
        const endDate = state.trip.meta.endDate || startDate;
        const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${encodeURIComponent(first.latitude)}&longitude=${encodeURIComponent(first.longitude)}&current=temperature_2m,weathercode&hourly=temperature_2m,weathercode,precipitation_probability&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&start_date=${encodeURIComponent(startDate)}&end_date=${encodeURIComponent(endDate)}`;
        const weatherResponse = await safeFetch(weatherUrl, {}, 12000);
        const weatherData = await weatherResponse.json();
        const days = {};
        (weatherData.daily?.time || []).forEach((date, index) => {
          days[date] = {
            code: weatherData.daily.weathercode?.[index],
            label: getWeatherLabel(weatherData.daily.weathercode?.[index]),
            tMax: weatherData.daily.temperature_2m_max?.[index],
            tMin: weatherData.daily.temperature_2m_min?.[index],
            rain: weatherData.daily.precipitation_probability_max?.[index]
          };
        });
        const hourly = {};
        (weatherData.hourly?.time || []).forEach((time, index) => {
          const dateKey = String(time).slice(0, 10);
          hourly[dateKey] = hourly[dateKey] || [];
          hourly[dateKey].push({
            time,
            temp: weatherData.hourly.temperature_2m?.[index],
            code: weatherData.hourly.weathercode?.[index],
            rain: weatherData.hourly.precipitation_probability?.[index]
          });
        });
        setCached("weather", key, {
          destination: first.name || state.trip.meta.destination,
          latitude: first.latitude,
          longitude: first.longitude,
          updatedAt: new Date().toISOString(),
          current: weatherData.current ? {
            time: weatherData.current.time,
            temp: weatherData.current.temperature_2m,
            code: weatherData.current.weathercode,
            label: getWeatherLabel(weatherData.current.weathercode)
          } : null,
          hourly,
          days
        }, "open-meteo");
        renderApp();
      } catch (error) {
        // La météo est un bonus, on ne bloque jamais l'interface si la source échoue.
      } finally {
        state.runtime.weatherLoading = false;
        state.runtime.weatherKey = "";
      }
    }

    function syncWeatherAutoRefresh() {
      if (state.runtime.weatherRefreshTimer) {
        window.clearInterval(state.runtime.weatherRefreshTimer);
        state.runtime.weatherRefreshTimer = null;
      }
      if (!state.trip.meta.destination) return;
      state.runtime.weatherRefreshTimer = window.setInterval(() => {
        ensureWeatherLoaded(true);
      }, WEATHER_CACHE_TTL_MS);
    }

    function getSuggestedStepDraft() {
      const sorted = [...state.trip.steps].sort(sortSteps);
      const lastStep = sorted[sorted.length - 1];
      if (lastStep) {
        return {
          date: lastStep.date || state.trip.meta.startDate || ""
        };
      }
      return {
        date: state.trip.meta.startDate || ""
      };
    }

    function setFeedback(message, tone = "info") {
      state.ui.feedback = { message, tone, ts: Date.now() };
      window.clearTimeout(setFeedback._timer);
      setFeedback._timer = window.setTimeout(() => {
        state.ui.feedback = null;
        renderApp();
      }, 3200);
    }

    function openModal(type, payload = {}) {
      state.ui.modal = { type, payload };
      if (type === "add-place") {
        state.ui.placeSearchQuery = "";
        state.ui.placeSearchSelectionStart = null;
        state.ui.placeSearchSelectionEnd = null;
        state.ui.placeSearchResults = [];
        state.ui.placeSearchStatus = "";
        state.ui.selectedPlaceDraft = null;
      }
      renderApp();
    }

    function closeModal() {
      state.ui.modal = null;
      state.ui.placeSearchQuery = "";
      state.ui.placeSearchSelectionStart = null;
      state.ui.placeSearchSelectionEnd = null;
      state.ui.placeSearchResults = [];
      state.ui.placeSearchStatus = "";
      state.ui.selectedPlaceDraft = null;
      renderApp();
    }

    function rerenderWithPlaceSearchFocus() {
      const shouldRestore = state.ui.modal?.type === "add-place";
      const fallbackPos = String(state.ui.placeSearchQuery || "").length;
      const start = state.ui.placeSearchSelectionStart ?? fallbackPos;
      const end = state.ui.placeSearchSelectionEnd ?? fallbackPos;

      renderApp();

      if (!shouldRestore) return;
      requestAnimationFrame(() => {
        const nextInput = document.getElementById("place-search");
        if (!nextInput) return;
        nextInput.focus({ preventScroll: true });
        try {
          nextInput.setSelectionRange(start, end);
        } catch (error) {
          // Certains navigateurs limitent setSelectionRange sur certains types d'input.
        }
      });
    }

    function upsertPlace(place) {
      const existingIndex = state.trip.places.findIndex((item) => item.id === place.id);
      if (existingIndex >= 0) state.trip.places[existingIndex] = place;
      else state.trip.places.unshift(place);
      saveTrip();
    }

    function upsertStep(step) {
      const existingIndex = state.trip.steps.findIndex((item) => item.id === step.id);
      if (existingIndex >= 0) state.trip.steps[existingIndex] = step;
      else state.trip.steps.push(step);
      saveTrip();
    }

    function deleteStep(id) {
      state.trip.steps = state.trip.steps.filter((step) => step.id !== id);
      saveTrip();
      setFeedback("Etape supprimée.", "success");
      renderApp();
    }

    function deletePlace(id) {
      state.trip.places = state.trip.places.filter((place) => place.id !== id);
      state.trip.steps = state.trip.steps.map((step) => step.placeId === id ? { ...step, placeId: null } : step);
      saveTrip();
      setFeedback("Lieu supprimé.", "success");
      renderApp();
    }

    function moveStep(stepId, direction) {
      const grouped = groupStepsByDay();
      for (const [, steps] of grouped) {
        const index = steps.findIndex((step) => step.id === stepId);
        if (index === -1) continue;
        const swapIndex = direction === "up" ? index - 1 : index + 1;
        if (swapIndex < 0 || swapIndex >= steps.length) return;
        const current = steps[index];
        const swap = steps[swapIndex];
        const currentTime = current.time;
        current.time = swap.time;
        swap.time = currentTime;
        saveTrip();
        renderApp();
        return;
      }
    }

    function renderApp() {
      const root = document.getElementById("app");
      const stats = computeStats();
      const hiddenTabs = isBudgetHidden() ? ["budget", "documents"] : [];
      const activeTab = hiddenTabs.includes(state.activeTab) ? "planning" : state.activeTab;
      state.activeTab = activeTab;
      document.body.setAttribute("data-theme", state.theme);
      const themeMeta = document.querySelector('meta[name="theme-color"]');
      if (themeMeta) {
        themeMeta.setAttribute("content", state.theme === "dark" ? "#0b1220" : "#f7f9fc");
      }
      const screen = {
        planning: renderPlanning(stats),
        map: renderMap(),
        places: renderPlaces(),
        budget: renderBudget(),
        documents: renderDocuments()
      }[activeTab];

      root.innerHTML = `
        <header class="topbar">
          <div class="brand">
            <div>
              <h1>${escapeHtml(state.trip.meta.title)}</h1>
              <p>${escapeHtml(state.trip.meta.destination)} · ${formatDateLabel(state.trip.meta.startDate)} au ${formatDateLabel(state.trip.meta.endDate)}</p>
            </div>
            <div class="top-actions">
              <div class="theme-switch" aria-label="Choix du theme">
                <button class="theme-chip ${state.theme === "light" ? "active" : ""}" data-action="set-theme" data-theme="light" aria-label="Activer le theme clair">☀</button>
                <button class="theme-chip ${state.theme === "dark" ? "active" : ""}" data-action="set-theme" data-theme="dark" aria-label="Activer le theme sombre">☾</button>
              </div>
              <button class="icon-btn" data-action="open-trip-settings" aria-label="Modifier le séjour">✦</button>
            </div>
          </div>
        </header>
        <main class="screen">
          ${state.ui.feedback ? `<div class="status-banner ${state.ui.feedback.tone}">${escapeHtml(state.ui.feedback.message)}</div>` : ""}
          ${screen}
          <div class="attribution">Données cartographiques et géocodage par OpenStreetMap / Nominatim.</div>
        </main>
        ${renderFab()}
        ${renderBottomNav()}
        ${renderModal()}
      `;

      bindEvents();
      injectManifest();
      syncWeatherAutoRefresh();
      if (activeTab === "planning" || activeTab === "map") {
        ensureWeatherLoaded();
      }
      if (activeTab === "map") {
        initRouteMap();
      } else {
        destroyRouteMap();
      }
    }

    function scrollToTop() {
      window.scrollTo({
        top: 0,
        behavior: shouldReduceMotion() ? "auto" : "smooth"
      });
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    }

    function restoreScrollPosition(scrollY) {
      const targetY = Math.max(0, Number(scrollY) || 0);
      requestAnimationFrame(() => {
        window.scrollTo({
          top: targetY,
          behavior: "auto"
        });
        document.documentElement.scrollTop = targetY;
        document.body.scrollTop = targetY;
      });
    }

    function restorePlaceCardIntoView(placeId, fallbackScrollY = null) {
      requestAnimationFrame(() => {
        const card = document.getElementById(`place-card-${String(placeId || "")}`);
        if (card) {
          card.scrollIntoView({
            block: "center",
            inline: "nearest",
            behavior: "auto"
          });
          return;
        }
        if (fallbackScrollY != null) restoreScrollPosition(fallbackScrollY);
      });
    }

    function renderFab() {
      const labels = {
        planning: { label: "+ Etape", action: "add-step" },
        map: { label: "Partager", action: "share-trip" },
        places: { label: "+ Lieu", action: "add-place" },
        budget: { label: "Exporter", action: "export-trip" },
        documents: { label: "+ Document", action: "add-document" }
      };
      const current = labels[state.activeTab];
      return `<button class="fab" data-action="${current.action}">${current.label}</button>`;
    }

    function renderBottomNav() {
      const tabs = [
        ["planning", "Planning", "◷"],
        ["map", "Carte", "⌘"],
        ["places", "Lieux", "⌂"],
        ["documents", "Docs", "⌁"],
        ["budget", "Budget", "€"]
      ].filter(([key]) => !(isBudgetHidden() && ["budget", "documents"].includes(key)));
      return `
        <nav class="bottom-nav" aria-label="Navigation principale">
          <div class="bottom-nav-inner" data-count="${tabs.length}">
            ${tabs.map(([key, label, icon]) => `
              <button class="nav-btn ${state.activeTab === key ? "active" : ""}" data-action="switch-tab" data-tab="${key}">
                <span class="icon">${icon}</span>
                <span>${label}</span>
              </button>
            `).join("")}
          </div>
        </nav>
      `;
    }

    function renderTimelineSmartCard() {
      const context = getTimelineContext();
      const focusStep = context.current || context.upcoming;
      const focusLabel = context.current ? "En cours maintenant" : "À venir";
      return `
        <article class="card">
          <div class="section-title" style="margin-bottom:10px;">
            <div>
              <h3>Timeline intelligente</h3>
              <p>${context.current ? "L'app suit le séjour en temps réel." : "Vue d'anticipation sur la prochaine séquence."}</p>
            </div>
            <span class="badge">${context.progress}% fait</span>
          </div>
          ${focusStep ? `
            <div class="stack">
              <div class="mini-map">
                <strong>${focusLabel}</strong>
                <p class="muted">${escapeHtml(formatRelativeStepTime(focusStep))}</p>
                <div style="font-weight:800;font-size:1.05rem;margin-top:6px;">${escapeHtml(focusStep.title || "Étape")}</div>
                <p class="muted" style="margin-top:8px;">${escapeHtml(focusStep.address || "Adresse libre")}</p>
              </div>
            </div>
          ` : `<p class="muted">Aucune étape datée à suivre pour le moment.</p>`}
        </article>
      `;
    }

    function renderStepTransition(fromStep, toStep) {
      const segment = estimateTravelSegment(fromStep, toStep);
      if (segment.minutes == null) return "";
      const stressTone = segment.availableMinutes != null && segment.minutes != null && segment.availableMinutes < segment.minutes ? "danger" : "";
      const marginText = segment.availableMinutes == null
        ? "Temps libre"
        : `${segment.availableMinutes} min disponibles`;
      return `
        <div class="badge-row" style="margin:-2px 0 2px 72px;">
          <span class="badge ${stressTone}">${escapeHtml(segment.label)}</span>
          <span class="badge">${escapeHtml(marginText)}</span>
          ${segment.distanceKm != null ? `<span class="badge">${segment.distanceKm.toFixed(1)} km</span>` : ""}
        </div>
      `;
    }

    function renderPlanningDayInsights(dateKey, steps) {
      const weather = getWeatherSummaryForDay(dateKey);
      const weatherLive = getWeatherLiveSnapshot(dateKey);
      return `
        <div class="utility-grid" style="margin-bottom:12px;">
          <div class="mini-map weather-card">
            <strong>Météo du jour</strong>
            ${weatherLive?.current ? `
              <div class="weather-top">
                <div class="weather-icon" aria-hidden="true">${getWeatherIconMarkup(weatherLive.current.code, weatherLive.current.time)}</div>
                <div>
                  <div class="weather-temp">${Math.round(weatherLive.current.temp)}°C</div>
                  <div class="weather-label">${escapeHtml(getWeatherMomentPrefix(weatherLive.current.time))} · ${escapeHtml(weatherLive.current.label)}</div>
                </div>
              </div>
              ${weather ? `
                <div class="weather-subline">
                  <span>Prévision du jour · ${Math.round(weather.tMin)}-${Math.round(weather.tMax)}°C</span>
                  ${Number.isFinite(Number(weather.rain)) ? `<span>Pluie ${weather.rain}%</span>` : ""}
                </div>
              ` : ""}
            ` : weather ? `
              <div class="weather-top">
                <div class="weather-icon" aria-hidden="true">${weather.code != null ? getWeatherIconMarkup(weather.code) : getWeatherIconFromLabel(weather.label)}</div>
                <div>
                  <div class="weather-temp">${Math.round(weather.tMin)}-${Math.round(weather.tMax)}°C</div>
                  <div class="weather-label">${escapeHtml(weather.label)}</div>
                </div>
              </div>
            ` : `<p class="muted">Chargement météo ou données indisponibles.</p>`}
            ${weather && !weatherLive?.current && Number.isFinite(Number(weather.rain)) ? `<p class="muted">Pluie ${weather.rain}%</p>` : ""}
            ${weatherLive?.nextHour ? `<div class="badge-row"><span class="badge">Prochain créneau · ${formatWeatherSlotLabel(weatherLive.nextHour.time)}</span><span class="badge">${Math.round(weatherLive.nextHour.temp)}°C · ${getWeatherLabel(weatherLive.nextHour.code)}</span></div>` : ""}
            ${weatherLive?.updatedAt ? `<p class="muted" style="margin-top:8px;">Mis à jour à ${escapeHtml(formatWeatherUpdatedAt(weatherLive.updatedAt))}</p>` : ""}
          </div>
        </div>
      `;
    }

    function renderPlanning(stats) {
      const groups = groupStepsByDay();
      return `
        <section class="hero">
          <span class="eyebrow">Mon séjour</span>
          <h2>Tout le séjour, clair et bien rangé.</h2>

            <div class="tile"><span>Total étapes</span><strong>${stats.totalSteps}</strong></div>
            ${isBudgetHidden() ? `<div class="tile"><span>Total lieux</span><strong>${stats.placesCount}</strong></div>` : `<div class="tile"><span>Budget total</span><strong>${formatCurrency(stats.budget.total)}</strong></div>`}

        </section>
        <section class="section">

        </section>
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Timeline</h3>
              <p>Ajout, édition et tri chronologique en un geste.</p>
            </div>
            <button class="pill-btn primary" data-action="add-step">Ajouter</button>
          </div>
          <div class="stack">
            ${groups.length ? groups.map(([dateKey, steps]) => `
              <article class="card">
                <div class="day-header">
                  <div>
                    <h4>${escapeHtml(formatDayHeading(dateKey === "date-libre" ? "" : dateKey))}</h4>
                    <div class="muted">${dateKey !== "date-libre" ? formatDateLabel(dateKey) : "Date libre"} · ${steps.length} étape${steps.length > 1 ? "s" : ""}</div>
                  </div>

                </div>

                    ${renderStepCard(step, index, steps.length)}

            `).join("") : `
              <div class="empty-state">
                <strong>Aucune étape pour l'instant</strong>
                <p>Ajoutez un programme détaillé ou gardez juste quelques moments forts.</p>
                <button class="pill-btn primary" data-action="add-step">Ajouter une étape</button>
              </div>
            `}
          </div>
        </section>
      `;
    }

    function renderStepCard(step, index, total) {
      const linkedPlace = getLinkedPlaceForStep(step);
      return `
        <article class="card step-card ${step.done ? "done" : ""}">
          <div class="step-top">
            <div>
              <div class="time-badge">${escapeHtml(step.time || "--:--")}</div>
              ${linkedPlace?.imageUrl ? `
                <div class="step-thumb-wrap" aria-hidden="true">
                  <div class="step-thumb">
                    <img src="${escapeAttr(linkedPlace.imageUrl)}" alt="${escapeAttr(linkedPlace.imageAlt || linkedPlace.name || "Lieu")}" loading="lazy" decoding="async" fetchpriority="low" referrerpolicy="no-referrer" />
                  </div>
                </div>
              ` : ""}
            </div>
            <div class="step-main">
              <h4>${escapeHtml(step.title || "Etape sans titre")}</h4>
              <div class="badge-row" style="margin-top:8px;">
                <span class="badge">${escapeHtml(step.type || "autre")}</span>
                <span class="badge">${formatDuration(step.duration)}</span>
                ${isBudgetHidden() ? "" : `<span class="badge">${formatCurrency(step.cost)}</span>`}
              </div>
              ${step.note ? `<p>${escapeHtml(step.note)}</p>` : ""}
              ${step.address ? `<p>${escapeHtml(step.address)}</p>` : ""}
              ${linkedPlace ? `<p class="muted">Lieu lié : ${escapeHtml(linkedPlace.name)}</p>` : ""}
            </div>
          </div>
          <div class="action-row" style="margin-top:14px;">
            <button class="action-btn ${step.done ? "ghost" : "primary"}" data-action="toggle-step-done" data-id="${step.id}">${step.done ? "Marquée faite" : "Marquer faite"}</button>
            <button class="action-btn" data-action="open-step-maps" data-url="${escapeAttr(step.googleMapsUrl || buildGoogleMapsSearchUrl(step.address || step.title))}">Voir sur Maps</button>
            <button class="action-btn" data-action="edit-step" data-id="${step.id}">Modifier</button>
            <button class="action-btn" data-action="move-step-up" data-id="${step.id}" ${index === 0 ? "disabled" : ""}>Monter</button>
            <button class="action-btn" data-action="move-step-down" data-id="${step.id}" ${index === total - 1 ? "disabled" : ""}>Descendre</button>
            <button class="action-btn danger" data-action="delete-step" data-id="${step.id}">Supprimer</button>
          </div>
        </article>
      `;
    }

    function getEntryStatusLabel(status) {
      return {
        current: "En cours",
        upcoming: "À venir",
        done: "Terminé",
        planned: "Planifié"
      }[status] || "Planifié";
    }

    function renderMapLiveCard(selectedDay, entries) {
      const currentEntry = entries.find((entry) => entry.status === "current") || null;
      const nextEntry = entries.find((entry) => entry.status === "upcoming") || null;
      return `
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Carte vivante</h3>
              <p>${selectedDay === "all" ? "Lecture en direct du prochain mouvement utile." : "Lecture dynamique de la journée choisie."}</p>
            </div>
          </div>
          <div class="mini-map">
            <strong>${currentEntry ? "Point en cours" : "Prochaine étape visible"}</strong>
            <p class="muted">${escapeHtml(currentEntry ? currentEntry.name : (nextEntry?.name || "Aucune étape active"))}</p>
            <div class="badge-row">
              ${currentEntry ? `<span class="badge">Maintenant</span>` : ""}
              ${nextEntry ? `<span class="badge">${escapeHtml(formatRelativeStepTime(nextEntry.step))}</span>` : ""}
            </div>
          </div>
        </section>
      `;
    }

    function renderMap() {
      const selectedDay = getSelectedMapDay();
      const dayOptions = getMapDayOptions();
      const entries = getMapTimelineEntries(selectedDay);
      const plottedPoints = getMapPlottedPoints(selectedDay);
      const dayRoute = buildDayRouteUrl(selectedDay);
      const allRoute = buildAllRouteUrl();
      const mapCenter = plottedPoints[0] ? buildGoogleMapsMapUrl(plottedPoints[0].lat, plottedPoints[0].lon) : "";
      const selectedDayLabel = selectedDay === "all"
        ? "Tout le séjour"
        : (dayOptions.find((option) => option.key === selectedDay)?.label || "Jour sélectionné");

      return `
        <section class="hero">
          <span class="eyebrow">Plan</span>
          <h2>Carte, navigation et repères rapides.</h2>
          <p>Tout est prêt pour ouvrir Maps en un tap et garder une vue d'ensemble du parcours.</p>
          <div class="view-switch" aria-label="Choix du jour de la carte">
            <button class="view-chip ${selectedDay === "all" ? "active" : ""}" data-action="set-map-day" data-day="all">Tout</button>
            ${dayOptions.map((option) => `
              <button class="view-chip ${selectedDay === option.key ? "active" : ""}" data-action="set-map-day" data-day="${escapeAttr(option.key)}">${escapeHtml(option.chipLabel || option.label)}</button>
            `).join("")}
          </div>
        </section>
        ${renderMapLiveCard(selectedDay, entries)}
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Raccourcis carte</h3>
              <p>Les trajets essentiels du séjour.</p>
            </div>
          </div>
          <div class="utility-grid">
            <div class="mini-map">
              <strong>${selectedDay === "all" ? "Navigation du prochain jour" : escapeHtml(selectedDayLabel)}</strong>
              <p class="muted">${dayRoute ? "Séquence prête à être lancée dans Google Maps." : "Ajoutez au moins deux étapes sur ce jour pour générer l'itinéraire."}</p>
              <div class="action-row">
                <button class="pill-btn primary" ${dayRoute ? `data-action="open-external" data-url="${escapeAttr(dayRoute)}"` : "disabled"}>Lancer la navigation</button>
              </div>
            </div>
            <div class="mini-map">
              <strong>Navigation complète</strong>
              <p class="muted">${allRoute ? "Parcours global du séjour si la longueur d'URL reste raisonnable." : "Version complète indisponible ou trop longue."}</p>
              <div class="action-row">
                <button class="pill-btn primary" ${allRoute ? `data-action="open-external" data-url="${escapeAttr(allRoute)}"` : "disabled"}>Lancer la navigation</button>
                <button class="pill-btn" ${mapCenter ? `data-action="open-external" data-url="${escapeAttr(mapCenter)}"` : "disabled"}>Carte centree</button>
              </div>
            </div>
          </div>
        </section>
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Plan intégré</h3>
              <p>${selectedDay === "all" ? "Une lecture visuelle plus élégante du parcours complet." : `Une lecture visuelle centrée sur ${escapeHtml(selectedDayLabel.toLowerCase())}.`}</p>
            </div>
          </div>
          ${renderRouteMapCard(selectedDay)}
        </section>
        <section class="section">
          <div class="section-title">
            <div>
              <h3>${selectedDay === "all" ? "Étapes du séjour" : `Étapes de ${escapeHtml(selectedDayLabel.toLowerCase())}`}</h3>
              <p>Toute la timeline, avec indication claire quand une position manque encore.</p>
            </div>
          </div>
          <div class="stack">
            ${entries.length ? entries.map((entry) => `
              <article class="card">
                <div class="place-head">
                  <div class="place-copy">
                    <h4>${escapeHtml(entry.name)}</h4>
                    <p>${escapeHtml(entry.address || "Adresse non renseignée")}</p>
                  </div>
                  <span class="source-badge ${sourceClass(entry.sourceBadge)}">${escapeHtml(entry.sourceBadge)}</span>
                </div>
                <div class="badge-row" style="margin-top:12px;">
                  <span class="badge">${escapeHtml(entry.step.time || "--:--")} · ${escapeHtml(entry.type || "autre")}</span>
                  <span class="badge">${escapeHtml(getEntryStatusLabel(entry.status))}</span>
                  <span class="badge">${escapeHtml(entry.coordsLabel)}</span>
                  ${entry.place ? `<span class="badge">Fiche lieu liée</span>` : `<span class="badge">Depuis planning</span>`}
                </div>
                ${entry.place && entry.place.name !== entry.name ? `<p class="muted" style="margin:12px 0 0;">Lieu associé : ${escapeHtml(entry.place.name)}</p>` : ""}
                <div class="action-row" style="margin-top:14px;">
                  <button class="action-btn primary" data-action="open-external" data-url="${escapeAttr(entry.googleMapsUrl)}">Ouvrir dans Google Maps</button>
                  <button class="action-btn" data-action="edit-step" data-id="${entry.step.id}">Modifier l'étape</button>
                  ${entry.place ? `<button class="action-btn" data-action="edit-place" data-id="${entry.place.id}">Modifier le lieu</button>` : ""}
                </div>
                ${OPTIONAL_MAPS_EMBED_API_KEY && entry.hasCoords ? renderMapEmbed({ name: entry.name, address: entry.address }) : ""}
              </article>
            `).join("") : `
              <div class="empty-state">
                <strong>Aucune étape pour cette vue</strong>
                <p>Ajoutez des étapes au planning pour enrichir automatiquement la carte.</p>
              </div>
            `}
          </div>
        </section>
      `;
    }

    function renderMapEmbed(place) {
      const q = encodeURIComponent(`${place.name} ${place.address || ""}`.trim());
      const src = `https://www.google.com/maps/embed/v1/place?key=${OPTIONAL_MAPS_EMBED_API_KEY}&q=${q}`;
      return `
        <div class="mini-map" style="margin-top:14px;">
          <strong>Aperçu intégré</strong>
          <p class="muted">Maps Embed necessite une cle API facultative. L'app reste pleinement utilisable sans embed.</p>
          <iframe title="Carte de ${escapeHtml(place.name)}" src="${src}" style="width:100%;height:220px;border:0;border-radius:16px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
      `;
    }

    function getPlaceHistoryFallback(place) {
      return ({
        cache: "Données chargées depuis le cache.",
        "no-match": "Aucune fiche Wikipédia claire n'a été trouvée pour ce lieu. Vous pouvez compléter la fiche manuellement.",
        "summary-unavailable": "Le résumé automatique n'était pas disponible pour ce lieu. Vous pouvez compléter la fiche manuellement."
      }[place?.enrichmentStatus] || "Impossible de récupérer l'histoire du lieu. Vous pouvez compléter la fiche manuellement.");
    }

    function renderPlaceMedia(place) {
      if (place.imageUrl) {
        return `
          <div class="place-media">
            <img src="${escapeAttr(place.imageUrl)}" alt="${escapeAttr(place.imageAlt || place.name || "Lieu")}" loading="auto" decoding="async" fetchpriority="auto" referrerpolicy="no-referrer" />
          </div>
        `;
      }

      return `
        <div class="place-media" aria-hidden="true">
          <div class="place-media-fallback">Aucune image récupérée automatiquement pour ce lieu.</div>
        </div>
      `;
    }

    function renderPlaces() {
      return `
        <section class="hero">
          <span class="eyebrow">Bibliothèque de lieux</span>
          <h2>Chaque lieu garde son histoire, ses détails et votre note perso.</h2>
          <p>Recherche Nominatim avec debounce, enrichissement Wikipedia avec cache local et edition manuelle toujours disponible.</p>
        </section>
        ${renderPlacesPanel()}
      `;
    }

    function renderPlacesPanel() {
      return `
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Lieux sauvegardes</h3>
              <p>Ajoutez, corrigez, rafraîchissez ou complétez à la main.</p>
            </div>
            <button class="pill-btn primary" data-action="add-place">Ajouter</button>
          </div>
          <div class="stack">
            ${state.trip.places.length ? state.trip.places.map((place) => `
              <article class="card" id="place-card-${escapeAttr(place.id)}">
                ${renderPlaceMedia(place)}
                <div class="place-head">
                  <div class="place-copy">
                    <h4>${escapeHtml(place.name)}</h4>
                    <p>${escapeHtml(place.address || "Adresse libre")}</p>
                  </div>
                  <span class="source-badge ${sourceClass(place.sourceBadge)}">${escapeHtml(place.sourceBadge || "Manuel")}</span>
                </div>
                <div class="badge-row" style="margin-top:12px;">
                  <span class="badge">${escapeHtml(place.type || "lieu")}</span>
                  <span class="badge">${formatDuration(place.recommendedDuration)}</span>
                  ${isBudgetHidden() ? "" : `<span class="badge">${formatCurrency(place.estimatedCost)}</span>`}
                </div>
                ${place.shortDescription ? `<p style="margin:14px 0 0;" class="muted">${escapeHtml(place.shortDescription)}</p>` : ""}
                ${place.historyText ? `<p style="margin:10px 0 0;">${escapeHtml(place.historyText)}</p>` : `<p style="margin:10px 0 0;" class="muted">${escapeHtml(getPlaceHistoryFallback(place))}</p>`}
                ${place.anecdote ? `<div class="list-divider"></div><p><strong>Anecdote.</strong> ${escapeHtml(place.anecdote)}</p>` : ""}
                ${place.practicalTip ? `<p><strong>Conseil.</strong> ${escapeHtml(place.practicalTip)}</p>` : ""}
                ${place.personalNote ? `<p><strong>Note perso.</strong> ${escapeHtml(place.personalNote)}</p>` : ""}
                <div class="action-row" style="margin-top:14px;">
                  <button class="action-btn primary" data-action="edit-place" data-id="${place.id}">Modifier</button>
                  <button class="action-btn" data-action="assign-place-day" data-id="${place.id}">Attribuer a un jour</button>
                  <button class="action-btn" data-action="refresh-place" data-id="${place.id}">Enrichir auto</button>
                  <button class="action-btn" data-action="open-external" data-url="${escapeAttr(place.googleMapsUrl || buildGoogleMapsSearchUrl(place.address || place.name))}">Maps</button>
                  <button class="action-btn" ${place.wikiUrl ? `data-action="open-external" data-url="${escapeAttr(place.wikiUrl)}"` : "disabled"}>Wikipedia</button>
                  <button class="action-btn danger" data-action="delete-place" data-id="${place.id}">Supprimer</button>
                </div>
              </article>
            `).join("") : `
              <div class="empty-state">
                <strong>Ajoutez un premier lieu</strong>
                <p>Recherche auto si le reseau est disponible, saisie manuelle sinon.</p>
                <button class="pill-btn primary" data-action="add-place">Ajouter un lieu</button>
              </div>
            `}
          </div>
        </section>
      `;
    }

    function renderBudget() {
      if (isBudgetHidden()) {
        return `
          <section class="hero">
            <span class="eyebrow">Partage prive</span>
            <h2>Le budget est masque dans cette version partagee.</h2>
            <p>Le programme, les lieux et les informations utiles restent disponibles.</p>
          </section>
        `;
      }
      const budget = computeBudget();
      const stats = computeStats();
      const perDay = stats.daysCount ? budget.total / stats.daysCount : budget.total;
      return `
        <section class="hero">
          <span class="eyebrow">Vision budget</span>
          <h2>Un suivi clair, sans tableur.</h2>
          <p>Les montants sont calcules automatiquement a partir du planning et des lieux pour garder une vue simple et rassurante.</p>
        </section>
        <section class="section">
          <div class="stats-grid">
            <div class="metric"><span>Budget total</span><strong>${formatCurrency(budget.total)}</strong></div>
            <div class="metric"><span>Budget par jour</span><strong>${formatCurrency(perDay)}</strong></div>
            <div class="metric"><span>Transport</span><strong>${formatCurrency(budget.transport)}</strong></div>
            <div class="metric"><span>Repas</span><strong>${formatCurrency(budget.repas)}</strong></div>
            <div class="metric"><span>Visites</span><strong>${formatCurrency(budget.visites)}</strong></div>
            <div class="metric"><span>Lieux</span><strong>${formatCurrency(budget.lieux)}</strong></div>
            <div class="metric"><span>Autres</span><strong>${formatCurrency(budget.autres)}</strong></div>
            <div class="metric"><span>Etapes payantes</span><strong>${budget.payantCount}</strong></div>
            <div class="metric"><span>Temps estime</span><strong>${formatDuration(stats.totalDuration)}</strong></div>
            <div class="metric"><span>Total lieux</span><strong>${stats.placesCount}</strong></div>
          </div>
        </section>
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Partage et sauvegarde</h3>
              <p>Copie, export, import et partage systeme.</p>
            </div>
          </div>
          <div class="card">
            <div class="action-row">
              <button class="action-btn primary" data-action="copy-summary">Copier le résumé</button>
              <button class="action-btn" data-action="share-trip">Partager</button>
              <button class="action-btn" data-action="export-trip">Exporter le voyage</button>
              <label class="action-btn" for="${state.ui.importInputId}" style="display:inline-flex;align-items:center;">Importer un voyage</label>
              <input id="${state.ui.importInputId}" class="sr-only" type="file" accept="application/json" data-action="import-file" />
              <button class="action-btn danger" data-action="reset-trip">Reinitialiser</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderDocumentsPanel() {
      return `
        <section class="section">
          <div class="section-title">
            <div>
              <h3>Espace documents</h3>
              <p>Ajoutez vos billets, captures, vouchers ou PDF de voyage.</p>
            </div>
            <button class="pill-btn primary" data-action="add-document">Ajouter</button>
          </div>
          ${renderDocumentsSection()}
        </section>
      `;
    }

    function renderDocuments() {
      return `
        <section class="hero">
          <span class="eyebrow">Documents locaux</span>
          <h2>Billets, réservations et PDF utiles dans un espace dédié.</h2>
          <p>Les pièces jointes restent stockées sur cet appareil et ne partent pas dans le lien partagé.</p>
        </section>
        ${renderDocumentsPanel()}
      `;
    }

    function renderDocumentsSection() {
      if (!state.documents.length) {
        return `
          <div class="empty-state">
            <strong>Aucun document pour le moment</strong>
            <p>Ajoutez un billet, une réservation, une assurance ou un PDF utile pour garder tout le séjour dans la même app.</p>
            <button class="pill-btn primary" data-action="add-document">Ajouter un document</button>
          </div>
        `;
      }

      return `
        <div class="documents-grid">
          ${state.documents.map((documentItem) => `
            <article class="card document-card">
              ${getDocumentPreview(documentItem)}
              <div class="document-meta">
                <div class="place-head">
                  <div class="place-copy">
                    <h4>${escapeHtml(documentItem.title || "Document")}</h4>
                    <p>${escapeHtml(documentItem.note || documentItem.reference || "Document garde localement sur cet appareil.")}</p>
                  </div>
                  <span class="source-badge">${getDocumentKindLabel(documentItem.kind)}</span>
                </div>
                <div class="badge-row" style="margin-top:12px;">
                  <span class="badge">${documentItem.date ? escapeHtml(formatDateLabel(documentItem.date)) : "Date libre"}</span>
                  <span class="badge">${escapeHtml(documentItem.fileName || "Sans fichier")}</span>
                  <span class="badge">${escapeHtml(formatFileSize(documentItem.fileSize))}</span>
                </div>
                <div class="action-row" style="margin-top:14px;">
                  <button class="action-btn primary" ${documentItem.fileDataUrl || documentItem.externalUrl ? `data-action="open-document" data-id="${documentItem.id}"` : "disabled"}>Ouvrir</button>
                  <button class="action-btn" data-action="edit-document" data-id="${documentItem.id}">Modifier</button>
                  <button class="action-btn danger" data-action="delete-document" data-id="${documentItem.id}">Supprimer</button>
                </div>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderModal() {
      if (!state.ui.modal) {
        return `<div class="modal-backdrop"></div>`;
      }

      const { type, payload } = state.ui.modal;
      const content = {
        "trip-settings": renderTripSettingsModal(),
        "step-form": renderStepModal(payload.stepId, payload.placeId),
        "add-place": renderPlaceAddModal(),
        "edit-place": renderPlaceEditModal(payload.placeId),
        "document-form": renderDocumentModal(payload.documentId),
        "share-sheet": renderShareSheetModal()
      }[type] || "";

      return `
        <div class="modal-backdrop open" data-action="close-modal-backdrop">
          <div class="modal-sheet" role="dialog" aria-modal="true" onclick="event.stopPropagation()">
            <div class="sheet-grab"></div>
            ${content}
          </div>
        </div>
      `;
    }

    function renderDocumentModal(documentId) {
      const documentItem = state.documents.find((item) => item.id === documentId) || {
        id: uid(),
        kind: "billet",
        title: "",
        date: "",
        reference: "",
        note: "",
        externalUrl: "",
        fileName: "",
        fileSize: 0,
        mimeType: "",
        fileDataUrl: ""
      };

      return `
        <div class="sheet-top">
          <div>
            <h3>${documentId ? "Modifier le document" : "Ajouter un document"}</h3>
            <p>Billet, réservation, PDF ou capture utile. Les pièces jointes restent locales sur cet appareil.</p>
          </div>
          <button class="icon-btn" data-action="close-modal">×</button>
        </div>
        <form id="document-form" data-document-id="${documentItem.id}">
          <div class="field-grid">
            <div class="field">
              <label for="document-kind">Type</label>
              <select id="document-kind" name="kind">
                ${["billet", "reservation", "assurance", "itineraire", "autre"].map((kind) => `<option value="${kind}" ${documentItem.kind === kind ? "selected" : ""}>${getDocumentKindLabel(kind)}</option>`).join("")}
              </select>
            </div>
            <div class="field">
              <label for="document-date">Date</label>
              <input id="document-date" type="date" name="date" value="${escapeAttr(documentItem.date || "")}" />
            </div>
          </div>
          <div class="field">
            <label for="document-title">Titre</label>
            <input id="document-title" name="title" value="${escapeAttr(documentItem.title || "")}" placeholder="Ex. Vol AF1604, billet Trenitalia, réservation hôtel" required />
          </div>
          <div class="field">
            <label for="document-reference">Référence</label>
            <input id="document-reference" name="reference" value="${escapeAttr(documentItem.reference || "")}" placeholder="Ex. PNR, numéro de train, réservation" />
          </div>
          <div class="field">
            <label for="document-url">Lien externe</label>
            <input id="document-url" name="externalUrl" value="${escapeAttr(documentItem.externalUrl || "")}" placeholder="https://..." />
          </div>
          <div class="field">
            <label for="document-note">Note</label>
            <textarea id="document-note" name="note">${escapeHtml(documentItem.note || "")}</textarea>
          </div>
          <div class="field">
            <label for="document-file">Pièce jointe</label>
            <input id="document-file" type="file" name="file" accept="image/*,application/pdf" />
            <div class="field-hint" style="margin-top:8px;">Images et PDF conseillés. Gardez des fichiers légers pour ne pas saturer le stockage local.</div>
            ${documentItem.fileName ? `<div class="badge-row" style="margin-top:10px;"><span class="badge">${escapeHtml(documentItem.fileName)}</span><span class="badge">${escapeHtml(formatFileSize(documentItem.fileSize))}</span></div>` : ""}
          </div>
          <div class="action-row">
            <button class="action-btn primary" type="submit">Enregistrer</button>
            <button class="action-btn" type="button" data-action="close-modal">Fermer</button>
          </div>
        </form>
      `;
    }

    function renderTripSettingsModal() {
      return `
        <div class="sheet-top">
          <div>
            <h3>Configurer le séjour</h3>
            <p>Titre, destination, dates et compagnon.</p>
          </div>
          <button class="icon-btn" data-action="close-modal">×</button>
        </div>
        <form id="trip-settings-form">
          <div class="field">
            <label for="trip-title">Titre du séjour</label>
            <input id="trip-title" name="title" value="${escapeAttr(state.trip.meta.title)}" required />
          </div>
          <div class="field">
            <label for="trip-destination">Destination</label>
            <input id="trip-destination" name="destination" value="${escapeAttr(state.trip.meta.destination)}" required />
          </div>
          <div class="field-grid">
            <div class="field">
              <label for="trip-start">Début</label>
              <input id="trip-start" type="date" name="startDate" value="${escapeAttr(state.trip.meta.startDate)}" />
            </div>
